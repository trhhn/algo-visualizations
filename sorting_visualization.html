<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Coins – Bubble & Selection Sort</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e22;
    color: #cccccc;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: #eeeeee;
  }

  .subtitle {
    text-align: center;
    color: #666670;
    margin-bottom: 24px;
    font-size: 0.88rem;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 10px;
  }

  .tab {
    padding: 10px 24px;
    border: 2px solid #505055;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    background: #383840;
    color: #aaaaaa;
  }

  .tab:hover { border-color: #22c55e; }
  .tab.active { border-color: #22c55e; background: rgba(34,197,94,0.1); color: #22c55e; }

  /* ── Stage ── */
  .stage {
    background: #252528;
    border-radius: 12px;
    padding: 28px 24px 24px;
    max-width: 860px;
    margin: 0 auto;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  /* ── Coins row ── */
  .coins-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 12px;
    min-height: 130px;
    margin-bottom: 20px;
  }

  .coin-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    transition: transform 0.35s ease;
  }

  .coin {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.2rem;
    border: 3px solid rgba(255,255,255,0.15);
    box-shadow: inset 0 -4px 8px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.4);
    transition: background 0.25s, box-shadow 0.25s, transform 0.25s;
    cursor: default;
    user-select: none;
    position: relative;
  }

  /* coin colours by denomination (cents; 100 = 1€, 200 = 2€) */
  .coin[data-val="5"]   { background: radial-gradient(circle at 35% 35%, #c98a4b, #8b5a2b); color: #fff3e0; }
  .coin[data-val="10"]  { background: radial-gradient(circle at 35% 35%, #e8c468, #b8902a); color: #3a2a00; }
  .coin[data-val="20"]  { background: radial-gradient(circle at 35% 35%, #ecd080, #c4a030); color: #3a2a00; }
  .coin[data-val="50"]  { background: radial-gradient(circle at 35% 35%, #f0d890, #d0aa3a); color: #3a2a00; }
  .coin[data-val="100"] { background: radial-gradient(circle, #e8d840 0%, #e8d840 52%, #cfcfcf 58%, #f0f0f0 100%); color: #2a2a2a; border-color: #cfcfcf; }
  .coin[data-val="200"] { background: radial-gradient(circle, #d8d8d8 0%, #d8d8d8 52%, #d4af37 58%, #f0d860 100%); color: #2a2a2a; border-color: #d4af37; }

  /* state highlights */
  .coin.comparing {
    box-shadow: 0 0 0 4px #f0c040, inset 0 -4px 8px rgba(0,0,0,0.3);
    transform: translateY(-8px);
  }

  .coin.swapping {
    box-shadow: 0 0 0 4px #ff6b6b, inset 0 -4px 8px rgba(0,0,0,0.3);
    transform: translateY(-14px);
  }

  .coin.minimum {
    box-shadow: 0 0 0 4px #4ecdc4, 0 0 16px 4px rgba(78,205,196,0.7), inset 0 -4px 8px rgba(0,0,0,0.3);
    transform: translateY(-12px);
  }

  .coin.min-marker {
    outline: 3px dashed #4ecdc4;
    outline-offset: 5px;
  }

  .coin.current-pos {
    box-shadow: 0 0 0 4px #a78bfa, inset 0 -4px 8px rgba(0,0,0,0.3);
    transform: translateY(-8px);
  }

  .coin.sorted {
    box-shadow: 0 0 0 3px #6bcb77, inset 0 -4px 8px rgba(0,0,0,0.3);
    opacity: 0.85;
  }

  .coin-label {
    font-size: 0.78rem;
    color: #888;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
    font-size: 0.82rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid;
  }

  /* ── Explanation box ── */
  .explanation {
    background: #2a2a32;
    border-radius: 8px;
    padding: 14px 18px;
    min-height: 56px;
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 20px;
    border-left: 3px solid #22c55e;
    color: #cccccc;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    background: #2a2a32;
    border-radius: 8px;
    height: 6px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: #22c55e;
    border-radius: 8px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  .btn {
    padding: 9px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary   { background: #22c55e; color: #0a1a10; }
  .btn-secondary { background: #383840; color: #cccccc; }
  .btn-danger    { background: #b83030; color: #fff; }
  .btn-play      { background: #226633; color: #88eea8; min-width: 110px; }

  .btn-primary:hover:not(:disabled)   { background: #1ea84f; }
  .btn-secondary:hover:not(:disabled) { background: #48484f; }
  .btn-danger:hover:not(:disabled)    { background: #a02020; }
  .btn-play:hover:not(:disabled)      { background: #1a5028; }

  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: #888890;
  }

  input[type=range] {
    accent-color: #22c55e;
    width: 90px;
  }

  /* ── Step counter ── */
  .step-info {
    text-align: center;
    color: #666670;
    font-size: 0.82rem;
    margin-top: 12px;
  }

  /* ── Pseudocode panel ── */
  .pseudo-wrap {
    max-width: 860px;
    margin: 16px auto 0;
  }

  .pseudo-title {
    font-size: 0.72rem;
    color: #666670;
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .pseudocode {
    background: #13131a;
    border-radius: 8px;
    padding: 16px 20px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    line-height: 1.8;
    color: #b0c4de;
    border: 1px solid #2a2a38;
    white-space: pre;
  }

  .pseudocode .line {
    padding: 1px 6px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .pseudocode .line.active-line {
    background: rgba(34, 197, 94, 0.15);
    color: #22c55e;
    font-weight: 600;
  }

  .pseudocode .kw  { color: #c792ea; }
  .pseudocode .fn  { color: #82aaff; }
  .pseudocode .num { color: #f78c6c; }
  .pseudocode .cmt { color: #546e7a; font-style: italic; }

  .tabs-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; margin-bottom:20px; }
  .tabs-row-right { display:flex; justify-content:flex-end; align-items:center; gap:6px; }
  .lang-label { font-size:0.82rem; color:#888888; }
  #langSelect { background:#383840; color:#cccccc; border:2px solid #505055; border-radius:8px; padding:4px 8px; font-size:0.82rem; cursor:pointer; }
</style>
</head>
<body>

<h1 id="pageTitle">Sorting Coins</h1>
<p class="subtitle" id="pageSubtitle">Step through Bubble Sort and Selection Sort — one comparison at a time</p>

<div class="tabs-row">
  <div></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('bubble')">Bubble Sort</button>
    <button class="tab"        onclick="switchTab('selection')">Selection Sort</button>
  </div>
  <div class="tabs-row-right">
    <label class="lang-label">Language:</label>
    <select id="langSelect" onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="de">DE</option>
    </select>
  </div>
</div>

<div class="stage">
  <div class="legend" id="legend"></div>
  <div class="coins-row" id="coinsRow"></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="explanation" id="explanation">Press <strong>Next Step</strong> to start sorting!</div>
  <div class="controls">
    <button class="btn btn-secondary" onclick="stepBack()"  id="btnBack">◀ Back</button>
    <button class="btn btn-primary"   onclick="stepForward()" id="btnNext">Next Step ▶</button>
    <button class="btn btn-play"      onclick="togglePlay()" id="btnPlay">▶ Auto Play</button>
    <button class="btn btn-danger"    id="btnNewCoins" onclick="resetSort()">↺ New Coins</button>
    <div class="speed-wrap">
      <span id="speedText">Speed</span>
      <input type="range" id="speedSlider" min="1" max="5" value="3">
      <span id="speedLabel">3×</span>
    </div>
  </div>
  <div class="step-info" id="stepInfo">Step 0</div>
</div>

<div class="pseudo-wrap">
  <div class="pseudo-title" id="pseudoTitle">Java Code</div>
  <div class="pseudocode" id="pseudocode"></div>
</div>

<script>
// ─────────────────────────────────────────────
//  Language strings
// ─────────────────────────────────────────────
let lang = 'en';

const STRINGS = {
  en: {
    title:    'Sorting Coins',
    subtitle: 'Step through Bubble Sort and Selection Sort — one comparison at a time',
    back:     '◀ Back',
    next:     'Next Step ▶',
    autoPlay: '▶ Auto Play',
    pause:    '⏸ Pause',
    newCoins: '↺ New Coins',
    speed:    'Speed',
    javaCode: 'Java Code',
    stepOf:   (i, n) => `Step ${i} of ${n}`,
    pos:      i => `pos ${i}`,
    legend: {
      comparing: 'Comparing', swapping: 'Swapping', sorted: 'Sorted',
      currentPos: 'Current position', currentMin: 'Current minimum', scanning: 'Scanning'
    },
    bIntro:   n  => `We have ${n} coins in a random order. Let\'s sort them from smallest to largest using <strong>Bubble Sort</strong>!`,
    bPass:    p  => `Pass ${p}: changed = false. Scan through the coins from left to right.`,
    bCmp:     (a,b) => `Comparing <strong>${a}</strong> and <strong>${b}</strong>. Is ${a} > ${b}?`,
    bSwap1:   (a,b,i,j) => `Yes! ${a} > ${b} — call swap(arr, ${i}, ${j}).`,
    bSwap2:   (a,b)   => `Swapped! <strong>${a}</strong> is now left of <strong>${b}</strong>. changed = true.`,
    bNo:      (a,b)   => `No — ${a} ≤ ${b}, no swap needed.`,
    bEnd:     p       => `End of pass ${p}. while(changed) is true — go again.`,
    bDone:    'No swaps this pass — changed = false, so while(changed) stops. The coins are sorted! 🎉',
    bFinal:   'All coins are sorted! 🎉 Bubble Sort is done.',
    sIntro:   n  => `We have ${n} coins in a random order. Let\'s sort them using <strong>Selection Sort</strong>!`,
    sRound:   (r,i,coin) => `Round ${r}: int min = ${i}. Assume position ${i} (coin <strong>${coin}</strong>) holds the minimum.`,
    sCmp:     (min,coin) => `Comparing current minimum <strong>${min}</strong> with coin <strong>${coin}</strong>. Is ${coin} smaller?`,
    sNew:     (nm,old)   => `Yes! <strong>${nm}</strong> < ${old} — min = j.`,
    sStay:    (coin,min) => `No — ${coin} ≥ ${min}, min stays at <strong>${min}</strong>.`,
    sSwapCall:(i,mi,coin)=> `Call swap(arr, ${i}, ${mi}) — move <strong>${coin}</strong> into position ${i}.`,
    sSwapped: coin => `Swapped! Coin <strong>${coin}</strong> is now in its correct position.`,
    sNoSwap:  (coin,i) => `Coin <strong>${coin}</strong> is already the minimum — swap(arr, ${i}, ${i}) does nothing.`,
    sDone:    (i,sz) => `Position ${i} is sorted. ${sz} coin${sz > 1 ? 's' : ''} placed correctly (green).`,
    sFinal:   'All coins are sorted! 🎉 Selection Sort is done.',
  },
  de: {
    title:    'Münzen sortieren',
    subtitle: 'Schritt für Schritt durch Bubble Sort und Selection Sort',
    back:     '◀ Zurück',
    next:     'Nächster Schritt ▶',
    autoPlay: '▶ Autoplay',
    pause:    '⏸ Pause',
    newCoins: '↺ Neue Münzen',
    speed:    'Tempo',
    javaCode: 'Java-Code',
    stepOf:   (i, n) => `Schritt ${i} von ${n}`,
    pos:      i => `Pos ${i}`,
    legend: {
      comparing: 'Vergleich', swapping: 'Tausch', sorted: 'Sortiert',
      currentPos: 'Aktuelle Position', currentMin: 'Aktuelles Minimum', scanning: 'Suche'
    },
    bIntro:   n  => `Wir haben ${n} Münzen in zufälliger Reihenfolge. Sortieren wir sie von klein nach groß mit <strong>Bubble Sort</strong>!`,
    bPass:    p  => `Durchlauf ${p}: changed = false. Münzen werden von links nach rechts durchsucht.`,
    bCmp:     (a,b) => `Vergleich von <strong>${a}</strong> und <strong>${b}</strong>. Ist ${a} > ${b}?`,
    bSwap1:   (a,b,i,j) => `Ja! ${a} > ${b} — Aufruf von swap(arr, ${i}, ${j}).`,
    bSwap2:   (a,b)   => `Getauscht! <strong>${a}</strong> steht jetzt links von <strong>${b}</strong>. changed = true.`,
    bNo:      (a,b)   => `Nein — ${a} ≤ ${b}, kein Tausch nötig.`,
    bEnd:     p       => `Ende von Durchlauf ${p}. while(changed) ist true — weitermachen.`,
    bDone:    'Kein Tausch in diesem Durchlauf — changed = false, while(changed) stoppt. Fertig! 🎉',
    bFinal:   'Alle Münzen sind sortiert! 🎉 Bubble Sort ist abgeschlossen.',
    sIntro:   n  => `Wir haben ${n} Münzen in zufälliger Reihenfolge. Sortieren wir sie mit <strong>Selection Sort</strong>!`,
    sRound:   (r,i,coin) => `Runde ${r}: int min = ${i}. Position ${i} (Münze <strong>${coin}</strong>) als Minimum angenommen.`,
    sCmp:     (min,coin) => `Vergleich aktuelles Minimum <strong>${min}</strong> mit Münze <strong>${coin}</strong>. Ist ${coin} kleiner?`,
    sNew:     (nm,old)   => `Ja! <strong>${nm}</strong> < ${old} — min = j.`,
    sStay:    (coin,min) => `Nein — ${coin} ≥ ${min}, min bleibt bei <strong>${min}</strong>.`,
    sSwapCall:(i,mi,coin)=> `Aufruf swap(arr, ${i}, ${mi}) — Münze <strong>${coin}</strong> an Position ${i}.`,
    sSwapped: coin => `Getauscht! Münze <strong>${coin}</strong> ist jetzt an der richtigen Stelle.`,
    sNoSwap:  (coin,i) => `Münze <strong>${coin}</strong> ist bereits das Minimum — swap(arr, ${i}, ${i}) ändert nichts.`,
    sDone:    (i,sz) => `Position ${i} sortiert. ${sz} Münze${sz > 1 ? 'n' : ''} korrekt platziert (grün).`,
    sFinal:   'Alle Münzen sind sortiert! 🎉 Selection Sort ist abgeschlossen.',
  }
};

function S() { return STRINGS[lang]; }

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.getElementById('langSelect').value = l;
  applyStaticLang();
  resetSort();
}

function applyStaticLang() {
  const s = S();
  document.getElementById('pageTitle').textContent   = s.title;
  document.getElementById('pageSubtitle').textContent = s.subtitle;
  document.getElementById('btnBack').innerHTML        = s.back;
  document.getElementById('btnNext').innerHTML        = s.next;
  document.getElementById('btnNewCoins').innerHTML    = s.newCoins;
  document.getElementById('speedText').textContent    = s.speed;
  document.getElementById('pseudoTitle').textContent  = s.javaCode;
  if (!playTimer) document.getElementById('btnPlay').innerHTML = s.autoPlay;
}

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let mode = 'bubble';   // 'bubble' | 'selection'
let steps = [];        // array of snapshots
let stepIndex = 0;
let playTimer = null;

const COIN_VALUES = [5, 10, 20, 50, 100, 200];
const COIN_LABELS = { 5:'5', 10:'10', 20:'20', 50:'50', 100:'1€', 200:'2€' };
const mlbl = v => v < 100 ? `${v} Cent${lang === 'en' ? 's' : ''}` : COIN_LABELS[v];

// ─────────────────────────────────────────────
//  Generate steps for Bubble Sort
// ─────────────────────────────────────────────
function buildBubbleSteps(arr) {
  const steps = [];
  const a = arr.slice();
  const n = a.length;
  const sorted = new Set();
  const s = S();

  const snap = (comparing, swapping, message, codeLine) => {
    steps.push({
      arr: a.slice(),
      comparing: comparing.slice(),
      swapping: swapping.slice(),
      minimum: [],
      currentPos: [],
      sorted: [...sorted],
      message,
      codeLine
    });
  };

  snap([], [], s.bIntro(n), 'intro');

  let changed = true;
  let passCount = 0;
  while (changed) {
    changed = false;
    passCount++;
    snap([], [], s.bPass(passCount), 'newpass');
    for (let i = 0; i < n - 1; i++) {
      snap([i, i+1], [], s.bCmp(mlbl(a[i]), mlbl(a[i+1])), 'compare');
      if (a[i] > a[i+1]) {
        snap([i, i+1], [i, i+1], s.bSwap1(mlbl(a[i]), mlbl(a[i+1]), i, i+1), 'swap');
        [a[i], a[i+1]] = [a[i+1], a[i]];
        changed = true;
        snap([i, i+1], [i, i+1], s.bSwap2(mlbl(a[i]), mlbl(a[i+1])), 'swap');
      } else {
        snap([i, i+1], [], s.bNo(mlbl(a[i]), mlbl(a[i+1])), 'compare');
      }
    }
    if (changed) {
      sorted.add(n - passCount);
      snap([], [], s.bEnd(passCount), 'endpass');
    } else {
      for (let k = 0; k < n; k++) sorted.add(k);
      snap([], [], s.bDone, 'endpass');
    }
  }
  snap([], [], s.bFinal, 'done');
  return steps;
}

// ─────────────────────────────────────────────
//  Generate steps for Selection Sort
// ─────────────────────────────────────────────
function buildSelectionSteps(arr) {
  const steps = [];
  const a = arr.slice();
  const n = a.length;
  const sorted = new Set();
  const s = S();

  const snap = (currentPos, minimum, comparing, swapping, message, codeLine) => {
    steps.push({
      arr: a.slice(),
      comparing,
      swapping,
      minimum,
      currentPos,
      sorted: [...sorted],
      message,
      codeLine
    });
  };

  snap([], [], [], [], s.sIntro(n), 'intro');

  for (let i = 0; i < n - 1; i++) {
    let minIdx = i;
    snap([i], [minIdx], [], [], s.sRound(i+1, i, mlbl(a[i])), 'setmin');

    for (let j = i + 1; j < n; j++) {
      snap([i], [minIdx], [j], [], s.sCmp(mlbl(a[minIdx]), mlbl(a[j])), 'compare');
      if (a[j] < a[minIdx]) {
        const old = a[minIdx];
        minIdx = j;
        snap([i], [minIdx], [j], [], s.sNew(mlbl(a[minIdx]), mlbl(old)), 'newmin');
      } else {
        snap([i], [minIdx], [j], [], s.sStay(mlbl(a[j]), mlbl(a[minIdx])), 'compare');
      }
    }

    if (minIdx !== i) {
      snap([i], [minIdx], [], [i, minIdx], s.sSwapCall(i, minIdx, mlbl(a[minIdx])), 'swap');
      [a[i], a[minIdx]] = [a[minIdx], a[i]];
      snap([i], [i], [], [i, minIdx], s.sSwapped(mlbl(a[i])), 'swap');
    } else {
      snap([i], [i], [], [], s.sNoSwap(mlbl(a[i]), i), 'swap');
    }

    sorted.add(i);
    snap([], [], [], [], s.sDone(i, sorted.size), 'newround');
  }

  sorted.add(n - 1);
  snap([], [], [], [], s.sFinal, 'done');
  return steps;
}

// ─────────────────────────────────────────────
//  Java code lines
// ─────────────────────────────────────────────
const PSEUDO = {
  bubble: [
    { text: '<span class="kw">public static void</span> <span class="fn">bubbleSort</span>(<span class="kw">int</span>[] arr){',                              line: 'intro' },
    { text: '    <span class="kw">boolean</span> changed;',                                                                                 line: -1 },
    { text: '    <span class="kw">do</span> {',                                                                                             line: -1 },
    { text: '        changed = <span class="kw">false</span>;',                                                                            line: 'newpass' },
    { text: '        <span class="kw">for</span>(<span class="kw">int</span> i=<span class="num">0</span>;i&lt;arr.length-<span class="num">1</span>;i++){', line: -1 },
    { text: '            <span class="kw">if</span>(arr[i]&gt;arr[i+<span class="num">1</span>]){',                                       line: 'compare' },
    { text: '                <span class="fn">swap</span>(arr,i,i+<span class="num">1</span>);',                                          line: 'swap' },
    { text: '                changed = <span class="kw">true</span>;',                                                                     line: 'swap' },
    { text: '            }',                                                                                                                line: -1 },
    { text: '        }',                                                                                                                    line: -1 },
    { text: '    } <span class="kw">while</span>(changed);',                                                                               line: 'endpass' },
    { text: '} <span class="cmt">// all sorted!</span>',                                                                                    line: 'done' },
  ],
  selection: [
    { text: '<span class="kw">public static void</span> <span class="fn">selectionSort</span>(<span class="kw">int</span>[] arr){',           line: 'intro' },
    { text: '    <span class="kw">for</span>(<span class="kw">int</span> i=<span class="num">0</span>;i&lt;arr.length-<span class="num">1</span>;i++){', line: 'newround' },
    { text: '        <span class="kw">int</span> min = i;',                                                                  line: 'setmin' },
    { text: '        <span class="kw">for</span>(<span class="kw">int</span> j=i+<span class="num">1</span>;j&lt;arr.length;j++){',         line: -1 },
    { text: '            <span class="kw">if</span>(arr[j]&lt;arr[min]){',                                                  line: 'compare' },
    { text: '                min = j;',                                                                                     line: 'newmin' },
    { text: '            }',                                                                                                 line: -1 },
    { text: '        }',                                                                                                     line: -1 },
    { text: '        <span class="fn">swap</span>(arr,i,min);',                                                            line: 'swap' },
    { text: '    }',                                                                                                         line: -1 },
    { text: '} <span class="cmt">// all sorted!</span>',                                                                   line: 'done' },
  ]
};

// ─────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────
function render() {
  if (!steps.length) return;
  const st = steps[stepIndex];
  const n = st.arr.length;

  // coins
  const row = document.getElementById('coinsRow');
  row.innerHTML = '';
  st.arr.forEach((val, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'coin-wrap';

    const coin = document.createElement('div');
    coin.className = 'coin';
    coin.dataset.val = val;
    coin.textContent = COIN_LABELS[val];

    const stateClasses = [];
    if (st.swapping.includes(i))      stateClasses.push('swapping');
    else if (st.comparing.includes(i)) stateClasses.push('comparing');
    else if (st.minimum.includes(i))   stateClasses.push('minimum');
    else if (st.currentPos.includes(i)) stateClasses.push('current-pos');
    else if (st.sorted.includes(i))    stateClasses.push('sorted');

    coin.classList.add(...stateClasses);
    if (st.minimum.includes(i)) coin.classList.add('min-marker');

    const lbl = document.createElement('div');
    lbl.className = 'coin-label';
    lbl.textContent = S().pos(i);

    wrap.appendChild(coin);
    wrap.appendChild(lbl);
    row.appendChild(wrap);
  });

  // explanation
  document.getElementById('explanation').innerHTML = st.message;

  // progress
  const pct = stepIndex / (steps.length - 1) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  // step counter
  document.getElementById('stepInfo').textContent = S().stepOf(stepIndex, steps.length - 1);

  // pseudocode
  const lines = PSEUDO[mode];
  const pseudo = document.getElementById('pseudocode');
  pseudo.innerHTML = lines.map(l =>
    `<div class="line${l.line === st.codeLine ? ' active-line' : ''}">${l.text}</div>`
  ).join('');

  // buttons
  document.getElementById('btnBack').disabled = stepIndex === 0;
  document.getElementById('btnNext').disabled = stepIndex === steps.length - 1;
}

// ─────────────────────────────────────────────
//  Controls
// ─────────────────────────────────────────────
function stepForward() {
  if (stepIndex < steps.length - 1) { stepIndex++; render(); }
  else stopPlay();
}

function stepBack() {
  if (stepIndex > 0) { stepIndex--; render(); }
}

function togglePlay() {
  if (playTimer) { stopPlay(); return; }
  document.getElementById('btnPlay').textContent = S().pause;
  document.getElementById('btnPlay').style.background = '#b07820';
  scheduleNext();
}

function scheduleNext() {
  const speed = parseInt(document.getElementById('speedSlider').value);
  const delay = [1200, 800, 500, 280, 120][speed - 1];
  playTimer = setTimeout(() => {
    if (stepIndex < steps.length - 1) {
      stepIndex++;
      render();
      scheduleNext();
    } else {
      stopPlay();
    }
  }, delay);
}

function stopPlay() {
  clearTimeout(playTimer);
  playTimer = null;
  document.getElementById('btnPlay').textContent = S().autoPlay;
  document.getElementById('btnPlay').style.background = '';
}

document.getElementById('speedSlider').addEventListener('input', function () {
  document.getElementById('speedLabel').textContent = this.value + '×';
  if (playTimer) { stopPlay(); togglePlay(); }
});

function resetSort() {
  stopPlay();
  const arr = shuffle(COIN_VALUES.slice());
  steps = mode === 'bubble' ? buildBubbleSteps(arr) : buildSelectionSteps(arr);
  stepIndex = 0;
  render();
}

function switchTab(newMode) {
  mode = newMode;
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', (i === 0) === (mode === 'bubble'))
  );
  updateLegend();
  resetSort();
}

function updateLegend() {
  const sl = S().legend;
  const items = mode === 'bubble'
    ? [
        ['#f0c040','#a07020', sl.comparing],
        ['#ff6b6b','#c04040', sl.swapping],
        ['#6bcb77','#3a8a3a', sl.sorted],
      ]
    : [
        ['#a78bfa','#6040c0', sl.currentPos],
        ['#16213e','#4ecdc4', sl.currentMin, true],
        ['#f0c040','#a07020', sl.scanning],
        ['#6bcb77','#3a8a3a', sl.sorted],
      ];
  document.getElementById('legend').innerHTML = items.map(([bg, border, label, dashed]) =>
    `<div class="legend-item">
       <div class="legend-dot" style="background:${bg};border-color:${border};${dashed ? 'border-style:dashed;border-width:2px' : ''}"></div>
       <span style="color:#ccc">${label}</span>
     </div>`
  ).join('');
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
const _storedLang = localStorage.getItem('lang');
if (_storedLang === 'de') { lang = 'de'; document.getElementById('langSelect').value = 'de'; applyStaticLang(); }
updateLegend();
resetSort();
</script>
