<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IEEE 754 Float Converter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    font-size: 15px;

  /* ── Input row ── */

    margin: 0 auto 28px;

    border: 1px solid #2e2e34;

  .input-row {
    display: flex;
    gap: 16px;

  }

    flex: 1;

    display: flex;

    background: #13131a;

    border-radius: 8px;

  button.convert-btn:hover { background: #22c55e; color: #111; border-color: #22c55e; }

  .rounding-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: #888890;

  }
  .rounding-heading { font-weight: 700; color: #666670; font-size: 0.82rem; }
  .rounding-row select { background:#383840; color:#cccccc; border:2px solid #505055; border-radius:8px; padding:4px 8px; font-size:0.82rem; cursor:pointer; }

  /* ── Bit display ── */
  .bit-section {
    max-width: 1000px;
    margin: 0 auto 20px;
    background: #252528;
    border-radius: 12px;
    padding: 20px 20px 16px;

  .bit-scroll { overflow-x: auto; padding-bottom: 6px; }

  .bit-row {
    display: flex;

    flex-wrap: nowrap;
    justify-content: center;

  }
  .bit-group { display: flex; gap: 2px; }

  .bit-box {
    width: 24px;

    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: 'Consolas', 'Courier New', monospace;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, color 0.12s, transform 0.08s;
    flex-shrink: 0;
    position: relative;
  }
  .bit-box:hover { transform: translateY(-2px); }
  .bit-box:active { transform: translateY(0); }

  /* sign */
  .bit-box.sign-0 { background: #3b0a0a; color: #cc7070; border: 1px solid #5a1a1a; }
  .bit-box.sign-1 { background: #9b1c1c; color: #fca5a5; border: 1px solid #dc2626; }

  /* exponent */
  .bit-box.exp-0 { background: #0f2040; color: #6090cc; border: 1px solid #1e3a6a; }
  .bit-box.exp-1 { background: #1d4ed8; color: #bfdbfe; border: 1px solid #3b82f6; }

  /* mantissa */
  .bit-box.man-0 { background: #0a2214; color: #4a9a6a; border: 1px solid #1a4a2a; }
  .bit-box.man-1 { background: #15803d; color: #86efac; border: 1px solid #22c55e; }

  .bit-labels {
    display: flex;
    margin-top: 8px;
    font-size: 0.72rem;
    color: #666670;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    justify-content: center;
    user-select: none;
  }
  .bit-label-sign  { width: 24px; text-align: center; }
  .bit-label-exp   { width: calc(8 * 24px + 7 * 2px); text-align: center; color: #4a7acc; }
  .bit-label-man   { width: calc(23 * 24px + 22 * 2px); text-align: center; color: #22c55e; }

  /* tooltip */
  .bit-box::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #13131a;
    color: #cccccc;
    font-size: 0.65rem;
    font-family: 'Segoe UI', sans-serif;
    font-weight: normal;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 5px;
    border: 1px solid #383840;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;

  }
  .bit-box:hover::after { opacity: 1; }

  /* ── Summary bar ── */
  .summary-bar {
    max-width: 1000px;
    margin: 0 auto 20px;
    background: #13131a;

    align-items: center;

  .summary-label { color: #666670; font-size: 0.78rem; font-family: 'Segoe UI', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

  .sum-hex-active { color: #cccccc; border-color: #666670; }

  /* ── Steps panel ── */
  .steps-section {
    max-width: 1000px;
    margin: 0 auto;
    display: none;
  }
  .period-note {
    margin-top: 8px;
    padding: 8px 12px;
    background: #1a2a1a;
    border: 1px solid #2a4a2a;

  .steps-panel {
    background: #252528;

  .step {

  .step-badge {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    background: #383840;

  .assemble-lbl { color: #666670; min-width: 90px; }
  .assemble-val { color: #eeeeee; }
  .assemble-val .s-bit { color: #fca5a5; }
  .assemble-val .e-bit { color: #bfdbfe; }
  .assemble-val .m-bit { color: #86efac; }
  .assemble-hex { color: #f59e0b; font-weight: 700; }

  .decode-panel {
    background: #252528;
    border-radius: 12px;

  .decode-panel h2 {
    font-size: 0.9rem;

    letter-spacing: 1px;

    gap: 10px;
    margin-bottom: 12px;
    font-size: 0.88rem;

    font-weight: 700;
    min-width: 140px;

    padding-top: 2px;
  }

  .decode-val code {
    font-family: 'Consolas', 'Courier New', monospace;
    background: #13131a;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.86em;

  .special-badge {
    display: inline-block;

    border: 1px solid #2d2d6a;

<body>

<a class="back-link" href="index.html">← Back</a>

<h1>IEEE 754 Float Converter</h1>
<p class="subtitle">Explore how decimal numbers are represented as 32-bit single-precision floats</p>

<!-- Input section -->
<div class="input-section">
  <div class="input-row">
    <div class="input-group">
      <label for="decInput">Decimal</label>
      <div class="input-with-btn">
        <input type="text" id="decInput" value="-16.75" placeholder="e.g. -16.75" />
        <button class="convert-btn" id="convertBtn">Convert →</button>
      </div>
    </div>
    <div class="input-group">
      <label for="hexInput">Binary</label>
      <div class="input-with-btn">
        <input type="text" id="hexInput" placeholder="e.g. C0870000" />
        <button class="convert-btn" id="decodeBtn">← From Bits</button>
      </div>
    </div>
  </div>
  <div class="rounding-row">
    <span class="rounding-heading">Mantissa overflow:</span>
    <select id="roundMode">
      <option value="truncate" selected>Truncate (cut off)</option>
      <option value="round">Round (half-to-even)</option>
    </select>
  </div>
</div>

<!-- Bit display -->
<div class="bit-section">
  <div class="bit-scroll">
    <div class="bit-row">
      <div class="bit-group" id="bitGroupSign"></div>
      <div class="bit-group" id="bitGroupExp"></div>
      <div class="bit-group" id="bitGroupMan"></div>
    </div>
    <div class="bit-labels">
      <div class="bit-label-sign" style="color:#f87171;">Sign<br>(1)</div>
      <div class="bit-label-exp">Exponent (8 bits)</div>
      <div class="bit-label-man">Mantissa (23 bits)</div>
    </div>
  </div>
</div>

<!-- Summary bar -->
<div class="summary-bar">
  <div class="summary-item">
    <span class="summary-label">Value</span>
    <span class="summary-value" id="sumValue">—</span>
  </div>
  <div class="summary-item summary-item-binary">
    <span class="summary-label">Binary
      <button class="sum-hex-btn" id="sumHexToggle" onclick="toggleSumHex()">show hex</button>
    </span>
    <span class="summary-value" id="sumBinaryDisplay">
      <span id="sumBitSign" style="color:#fca5a5">—</span>&thinsp;<span id="sumBitExp" style="color:#bfdbfe">—</span>&thinsp;<span id="sumBitMan" style="color:#86efac">—</span>
    </span>
    <span class="summary-value" id="sumHex" style="display:none; color:#f59e0b; margin-left:12px;">—</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">Error</span>
    <span class="summary-value" id="sumError">—</span>
  </div>
</div>

<!-- Steps / Decode panel -->
<div class="steps-section" id="stepsSection">
  <div id="stepsInner"></div>
</div>

<script>
// ── Core bit-level utilities ─────────────────────────────────────────────────
const buf = new ArrayBuffer(4);
const _f32 = new Float32Array(buf);
const _u32 = new Uint32Array(buf);

function decimalToU32(value) {
  _f32[0] = value;
  return _u32[0] >>> 0;
}
function u32ToDecimal(u32) {
  _u32[0] = u32;
  return _f32[0];
}
function u32ToBitString(u32) {
  return (u32 >>> 0).toString(2).padStart(32, '0');
}
function bitStringToU32(s) {
  return parseInt(s, 2) >>> 0;
}
function u32ToHex(u32) {
  return (u32 >>> 0).toString(16).toUpperCase().padStart(8, '0');
}
function hexToU32(hex) {
  return parseInt(hex, 16) >>> 0;
}

// ── State ────────────────────────────────────────────────────────────────────
let currentBits = new Array(32).fill(0); // bit[0] = sign (MSB), bit[31] = LSB
let lastMode = null; // 'decimal' | 'decode'
let lastDecimalValue = null;

// ── Bit display ──────────────────────────────────────────────────────────────
function makeBox(i) {
  const box = document.createElement('div');
  const bitPos = 31 - i;
  const cls = i === 0 ? 'sign' : i <= 8 ? 'exp' : 'man';
  box.className = 'bit-box ' + cls + '-' + currentBits[i];
  box.textContent = currentBits[i];
  box.dataset.tip = 'bit ' + bitPos;
  box.addEventListener('click', () => toggleBit(i));
  return box;
}

function buildBitRow() {
  const gs = document.getElementById('bitGroupSign');
  const ge = document.getElementById('bitGroupExp');
  const gm = document.getElementById('bitGroupMan');
  gs.innerHTML = ''; ge.innerHTML = ''; gm.innerHTML = '';
  gs.appendChild(makeBox(0));
  for (let i = 1; i <= 8; i++) ge.appendChild(makeBox(i));
  for (let i = 9; i < 32; i++) gm.appendChild(makeBox(i));
}

function updateBitRow() {
  const boxes = document.querySelectorAll('.bit-group .bit-box');
  boxes.forEach((box, i) => {
    const cls = i === 0 ? 'sign' : i <= 8 ? 'exp' : 'man';
    box.className = 'bit-box ' + cls + '-' + currentBits[i];
    box.textContent = currentBits[i];
  });
}

function setBitsFromU32(u32) {
  const s = u32ToBitString(u32);
  for (let i = 0; i < 32; i++) currentBits[i] = parseInt(s[i]);
}

function bitsToU32() {
  return bitStringToU32(currentBits.join(''));
}

function toggleBit(idx) {
  currentBits[idx] ^= 1;
  updateBitRow();
  const u32 = bitsToU32();
  updateSummary(u32);
  document.getElementById('hexInput').value = u32ToHex(u32);
  document.getElementById('decInput').value = '';
  lastMode = null;
  hideSteps();
}

// ── Summary bar ──────────────────────────────────────────────────────────────
function toggleSumHex() {
  const el  = document.getElementById('sumHex');
  const btn = document.getElementById('sumHexToggle');
  const show = el.style.display === 'none';
  el.style.display = show ? 'inline' : 'none';
  btn.textContent = show ? 'hide hex' : 'show hex';
  btn.classList.toggle('sum-hex-active', show);
}

function updateSummary(u32, origValue = null) {
  const val  = u32ToDecimal(u32);
  const bits = u32ToBitString(u32);
  document.getElementById('sumBitSign').textContent = bits[0];
  document.getElementById('sumBitExp').textContent  = bits.slice(1, 9);
  document.getElementById('sumBitMan').textContent  = bits.slice(9);
  document.getElementById('sumHex').textContent     = u32ToHex(u32);
  const valEl = document.getElementById('sumValue');
  const errEl = document.getElementById('sumError');
  if (isNaN(val)) {
    valEl.textContent = 'NaN'; valEl.className = 'summary-value special';
    errEl.textContent = '—';
  } else if (!isFinite(val)) {
    valEl.textContent = val > 0 ? '+Infinity' : '-Infinity'; valEl.className = 'summary-value special';
    errEl.textContent = '—';
  } else if (Object.is(val, -0)) {
    valEl.textContent = '-0'; valEl.className = 'summary-value special';
    errEl.textContent = '—';
  } else if (val === 0) {
    valEl.textContent = '+0'; valEl.className = 'summary-value special';
    errEl.textContent = origValue !== null ? (origValue >= 0 ? '+0' : '−0') : '—';
  } else {
    valEl.textContent = val; valEl.className = 'summary-value';
    if (origValue !== null && isFinite(origValue)) {
      const err = val - origValue;
      errEl.textContent = (err >= 0 ? '+' : '') + err.toPrecision(4);
      errEl.className = err !== 0 ? 'summary-value special' : 'summary-value';
    } else {
      errEl.textContent = '—'; errEl.className = 'summary-value';
    }
  }
}

// ── Steps helpers ────────────────────────────────────────────────────────────
function hideSteps() {
  document.getElementById('stepsSection').classList.remove('visible');
}
function showSteps(html) {
  document.getElementById('stepsInner').innerHTML = html;
  document.getElementById('stepsSection').classList.add('visible');
}

// ── Integer → binary (repeated division) ─────────────────────────────────────
function intToBinaryTable(n) {
  // Returns { bits: "10001", rows: [{n, quotient, remainder}, ...] }
  if (n === 0) return { bits: '0', rows: [] };
  const rows = [];
  let x = n;
  while (x > 0) {
    const q = Math.floor(x / 2);
    const r = x % 2;
    rows.push({ n: x, quotient: q, remainder: r });
    x = q;
  }
  const bits = rows.map(r => r.remainder).reverse().join('');
  return { bits, rows };
}

function intToBinTableHtml(n, label) {
  const { bits, rows } = intToBinaryTable(n);
  if (rows.length === 0) return { bits: '0', html: '<p><code>0</code> → <code>0</code></p>' };
  let html = '<table class="conv-table"><thead><tr><th>÷ 2</th><th>Quotient</th><th>Remainder</th></tr></thead><tbody>';
  for (const r of rows) {
    html += `<tr><td>${r.n}</td><td>${r.quotient}</td><td>${r.remainder}</td></tr>`;
  }
  html += '</tbody></table>';
  html += `<div style="font-size:0.8rem; color:#666670; margin-top:4px;">Read remainders bottom-to-top: <code>${bits}</code></div>`;
  return { bits, html };
}

// ── Detect repeating period in a bit string ───────────────────────────────────
function detectPeriod(bits) {
  const n = bits.length;
  for (let off = 0; off <= 4; off++) {
    for (let pLen = 1; pLen <= 16; pLen++) {
      const period = bits.slice(off, off + pLen);
      if (period.length < pLen) continue;
      let ok = true;
      for (let i = off; i < n; i++) {
        if (bits[i] !== period[(i - off) % pLen]) { ok = false; break; }
      }
      if (ok && n - off >= 2 * pLen) return { offset: off, period };
    }
  }
  return null;
}

// ── Fraction → binary (repeated multiplication) ───────────────────────────────
function fracToBinary(frac, maxBits) {
  // Returns string of bits (no leading "0.")
  const bits = [];
  let f = frac;
  for (let i = 0; i < maxBits; i++) {
    f *= 2;
    if (f >= 1) { bits.push(1); f -= 1; }
    else { bits.push(0); }
    if (f === 0) break;
  }
  return bits.join('');
}

function fracToBinTableHtml(frac, maxBits) {
  const rows = [];
  let f = frac;
  for (let i = 0; i < maxBits; i++) {
    const p = f * 2;
    const bit = p >= 1 ? 1 : 0;
    rows.push({ val: f.toPrecision(8), product: p.toPrecision(8), bit });
    f = bit === 1 ? p - 1 : p;
    if (f === 0) break;
  }
  const bits = rows.map(r => r.bit).join('');
  const isExact = (f === 0); // fraction terminated — no period, even if bits repeat by coincidence
  const pd = isExact ? null : detectPeriod(bits);

  // Cap table rows: if period found, show prefix + 2 full periods; else show all
  const showRows = pd
    ? Math.min(rows.length, pd.offset + 2 * pd.period.length)
    : rows.length;

  let html = '<table class="conv-table"><thead><tr><th>Value</th><th>× 2</th><th>Bit</th></tr></thead><tbody>';
  for (let i = 0; i < showRows; i++) {
    const r = rows[i];
    const mark = pd && i === pd.offset ? ' style="border-top:2px solid #22c55e;"' : '';
    html += `<tr${mark}><td>${r.val}</td><td>${r.product}</td><td>${r.bit}</td></tr>`;
  }
  if (pd) html += `<tr><td colspan="3" style="color:#666670; text-align:center;">⋯ repeats ⋯</td></tr>`;
  html += '</tbody></table>';

  if (pd) {
    const pre = bits.slice(0, pd.offset);
    html += `<div class="period-note">
      ♻ <strong>Repeating binary fraction</strong><br>
      0.${pre ? pre + '<span style="border-bottom:2px solid #22c55e;">' + pd.period + '</span>' : '<span style="border-bottom:2px solid #22c55e;">' + pd.period + '</span>'}…
      &nbsp;— the block <code>${pd.period}</code> (length ${pd.period.length}) repeats indefinitely.
      <br>0.${frac} has <strong>no exact binary representation</strong>.
    </div>`;
  } else {
    html += `<div style="font-size:0.85rem; color:#666670; margin-top:4px;">Read bits top-to-bottom: <code>.${bits}</code></div>`;
  }
  return { bits, html, period: pd };
}

// ── Decimal → u32 with explicit truncate vs round ───────────────────────────
function decimalToU32WithMode(value, mode) {
  // Special values and round mode: defer to Float32Array (authoritative)
  if (!isFinite(value) || value === 0 || isNaN(value) || mode === 'round') {
    _f32[0] = value;
    return _u32[0] >>> 0;
  }
  // Truncate: extract top 23 mantissa bits from the 64-bit double directly
  const negative = value < 0;
  const absVal = Math.abs(value);
  const dv = new DataView(new ArrayBuffer(8));
  dv.setFloat64(0, absVal, false); // big-endian
  const hi = dv.getUint32(0, false);
  const lo = dv.getUint32(4, false);
  const doubleExpBiased = (hi >>> 20) & 0x7FF;
  if (doubleExpBiased === 0 || doubleExpBiased === 0x7FF) {
    // subnormal double, NaN, Inf: fall back to Float32Array
    _f32[0] = value; return _u32[0] >>> 0;
  }
  const doubleExp = doubleExpBiased - 1023;
  const f32ExpBiased = doubleExp + 127;
  if (f32ExpBiased >= 255) return negative ? 0xFF800000 : 0x7F800000; // overflow → Inf
  if (f32ExpBiased <= 0)   { _f32[0] = value; return _u32[0] >>> 0; } // subnormal f32
  // Top 23 bits of the 52-bit double mantissa (bits 51..29)
  // hi[19..0] = mantissa bits 51..32, lo[31..0] = mantissa bits 31..0
  const mant23 = (((hi & 0x000FFFFF) << 3) | (lo >>> 29)) & 0x7FFFFF;
  return (((negative ? 1 : 0) << 31) | (f32ExpBiased << 23) | mant23) >>> 0;
}

// ── Round 23-bit mantissa ────────────────────────────────────────────────────
function applyRounding(mantBits, mode) {
  // mantBits: string longer than 23 chars (raw mantissa including guard bits)
  // Returns { bits23: string of 23, overflow: bool, note: string }
  if (mantBits.length <= 23) {
    return { bits23: mantBits.padEnd(23, '0'), overflow: false, note: null };
  }
  const kept = mantBits.slice(0, 23);
  const guard = mantBits[23]; // first dropped bit
  const tail  = mantBits.slice(24);

  if (mode === 'truncate') {
    return {
      bits23: kept,
      overflow: false,
      note: `Truncate mode: drop bits after position 23 (<code>${mantBits.slice(23)}</code>).`
    };
  }
  // Round half-to-even
  const guardBit = parseInt(guard, 10);
  const tailHasOnes = tail.indexOf('1') !== -1;
  const lsb = parseInt(kept[22], 10); // the 23rd bit (LSB of kept)
  const shouldRoundUp = guardBit === 1 && (tailHasOnes || lsb === 1);

  if (!shouldRoundUp) {
    return {
      bits23: kept,
      overflow: false,
      note: `Guard bit = <code>${guard}</code>, tail = <code>${tail || '(empty)'}</code> → round down (keep bits 1–23).`
    };
  }
  // Add 1 to 23-bit integer
  let val = parseInt(kept, 2) + 1;
  const overflow = val >= (1 << 23);
  const bits23 = (val & 0x7FFFFF).toString(2).padStart(23, '0');
  return {
    bits23,
    overflow,
    note: `Guard bit = <code>${guard}</code>, tail = <code>${tail || '(empty)'}</code>, LSB = <code>${lsb}</code> → round up. Adding 1 to mantissa${overflow ? ' caused overflow (exponent increments by 1)' : ''}.`
  };
}

// ── Decimal conversion with steps ───────────────────────────────────────────
function convertDecimal() {
  const raw = document.getElementById('decInput').value.trim();
  if (!raw) return;
  const value = parseFloat(raw);
  if (isNaN(value)) {
    alert('Please enter a valid decimal number.');
    return;
  }
  lastDecimalValue = value;
  lastMode = 'decimal';

  const mode = document.getElementById('roundMode').value;
  const u32 = decimalToU32WithMode(value, mode);
  setBitsFromU32(u32);
  updateBitRow();
  updateSummary(u32, value);
  document.getElementById('hexInput').value = u32ToHex(u32);

  // Build steps
  const stepsHtml = buildSteps(value, mode);
  showSteps(stepsHtml);
}

function buildSteps(value, mode) {
  const u32 = decimalToU32WithMode(value, mode);
  const bits = u32ToBitString(u32);

  // Special cases
  if (isNaN(value)) return buildSpecialSteps('NaN', bits);
  if (!isFinite(value)) return buildSpecialSteps(value > 0 ? '+Infinity' : '-Infinity', bits);
  if (value === 0) return buildSpecialSteps(Object.is(value, -0) ? '-0' : '+0', bits);

  const negative = value < 0;
  const absVal = Math.abs(value);
  const intPart = Math.floor(absVal);
  const fracPart = absVal - intPart;

  // Step 1: sign
  const signBit = negative ? 1 : 0;
  const step1 = `
<div class="step">
  <div class="step-badge">1</div>
  <div class="step-body">
    <div class="step-title">Sign Bit</div>
    The number is <strong>${negative ? 'negative' : 'positive'}</strong> →
    sign bit = <code class="${negative ? 'code-red' : 'code-green'}">${signBit}</code>
  </div>
</div>`;

  // Step 2: integer and fraction parts to binary
  const { bits: intBits, html: intTableHtml } = intToBinTableHtml(intPart, 'Integer');
  const { bits: fracBits, html: fracTableHtml, period: fracPeriod } = fracPart > 0
    ? fracToBinTableHtml(fracPart, 30)
    : { bits: '', html: '<p style="color:#666670; font-size:0.85rem;">No fractional part.</p>', period: null };

  const binaryRep = (intBits === '0' ? '0' : intBits) + (fracBits ? '.' + fracBits : '');
  function binaryRepCompact() {
    if (!fracPeriod) return binaryRep;
    const pre = fracBits.slice(0, fracPeriod.offset);
    return (intPart > 0 ? intBits : '0') + '.' + (pre || '') + '(' + fracPeriod.period + ')';
  }
  const step2 = `
<div class="step">
  <div class="step-badge">2</div>
  <div class="step-body">
    <div class="step-title">Convert |${value}| = ${absVal} to Binary</div>
    <strong>Integer part (${intPart}):</strong><br>
    ${intTableHtml}
    ${fracPart > 0 ? `<br><strong>Fractional part (${fracPart.toPrecision(8).replace(/\.?0+$/, '')}):</strong><br>${fracTableHtml}` : ''}
    <br>Binary: <code>${fracPeriod ? binaryRepCompact() : binaryRep}</code>
  </div>
</div>`;

  // Step 3: Normalize
  // Find the position of the leading 1
  const fullBin = (intBits === '0' ? '' : intBits) + (fracBits || '');
  // fullBin is the binary digits without the dot
  // We need to find leading 1 in binaryRep
  let exponent, mantissaRaw;
  if (intPart > 0) {
    // Leading 1 is in integer part
    exponent = intBits.length - 1; // intBits.length digits, shift left by (length-1)
    // Mantissa is everything after leading 1
    mantissaRaw = intBits.slice(1) + fracBits;
  } else {
    // Leading 1 is in fractional part
    const firstOne = fracBits.indexOf('1');
    if (firstOne === -1) {
      // Zero (shouldn't happen since we checked earlier)
      return buildSpecialSteps('+0', u32ToBitString(decimalToU32(0)));
    }
    exponent = -(firstOne + 1);
    mantissaRaw = fracBits.slice(firstOne + 1);
  }

  // Build compact mantissa string using period notation
  const mantissaPeriod = fracPeriod ? detectPeriod(mantissaRaw) : null;
  function periodStr(bits, pd) {
    if (!pd) return bits || '0';
    const pre = bits.slice(0, pd.offset);
    return (pre || '') + '(' + pd.period + ')';
  }

  const step3 = `
<div class="step">
  <div class="step-badge">3</div>
  <div class="step-body">
    <div class="step-title">Normalized Scientific Representation</div>
    Write in the form <code>1.xxx × 2<sup>n</sup></code>:<br><br>
    <code>${binaryRepCompact()}</code> = <code>1.${periodStr(mantissaRaw, mantissaPeriod)} × 2<sup>${exponent}</sup></code>
    ${intPart > 0
      ? `<br><span style="color:#666670; font-size:0.85rem;">(Shift binary point left ${exponent} place${exponent !== 1 ? 's' : ''})</span>`
      : `<br><span style="color:#666670; font-size:0.85rem;">(Shift binary point right ${-exponent} place${exponent !== -1 ? 's' : ''})</span>`}
    ${mantissaPeriod ? `<div class="period-note">♻ The mantissa bits after the <code>1.</code> repeat with period <code>${mantissaPeriod.period}</code> (length ${mantissaPeriod.period.length}) — infinite, so IEEE 754 stores only 23 bits (step 5).</div>` : ''}
  </div>
</div>`;

  // Step 4: Biased exponent
  const bias = 127;
  const biasedExp = exponent + bias;
  const { bits: expBits, html: expTableHtml } = intToBinTableHtml(biasedExp, 'Exponent');
  const expBits8 = expBits.padStart(8, '0');
  const step4 = `
<div class="step">
  <div class="step-badge">4</div>
  <div class="step-body">
    <div class="step-title">Biased Exponent</div>
    Exponent = <strong>${exponent}</strong>. Add bias 127:<br>
    <code>${exponent} + 127 = ${biasedExp}</code><br><br>
    Convert ${biasedExp} to 8-bit binary:<br>
    ${expTableHtml}
    <br>8-bit exponent: <code class="code-blue">${expBits8}</code>
  </div>
</div>`;

  // Step 5: Mantissa with rounding
  const raw23 = mantissaRaw.slice(0, 50); // cap for display
  const { bits23, overflow, note: roundNote } = applyRounding(raw23, mode);
  let finalExponent = exponent;
  let finalBiasedExp = biasedExp;
  let finalExpBits8 = expBits8;
  if (overflow) {
    finalExponent = exponent + 1;
    finalBiasedExp = finalExponent + bias;
    finalExpBits8 = finalBiasedExp.toString(2).padStart(8, '0');
  }

  // Build a 26-bit extension of the mantissa from the period (for rounding display)
  function expandPeriod(bits, pd, totalLen) {
    if (!pd) return bits.slice(0, totalLen).padEnd(totalLen, '0');
    let out = bits.slice(0, pd.offset);
    while (out.length < totalLen) out += pd.period;
    return out.slice(0, totalLen);
  }

  let step5 = `
<div class="step">
  <div class="step-badge">5</div>
  <div class="step-body">
    <div class="step-title">Mantissa (Significand)</div>`;

  if (mantissaPeriod) {
    // Repeating mantissa: explain cleanly without mentioning internal bit counts
    const ext26 = expandPeriod(mantissaRaw, mantissaPeriod, 26);
    const kept23 = ext26.slice(0, 23);
    const guardBit = ext26[23];
    step5 += `
    After the leading <code>1.</code>, the mantissa is <code>(${mantissaPeriod.period})</code> repeating forever.<br><br>
    IEEE 754 stores exactly <strong>23 bits</strong>. We extend the repeating pattern to get them:<br>
    <code>${ext26.slice(0,23)} | ${ext26.slice(23)}</code><br>
    <span style="color:#666670; font-size:0.88rem;">(the <code>|</code> marks where bit 23 ends; bits to the right are dropped or used for rounding)</span><br><br>`;
    if (mode === 'truncate') {
      step5 += `<strong>Truncate:</strong> keep the first 23 bits, drop the rest.<br>`;
    } else {
      step5 += `<strong>Round (half-to-even):</strong> bit 24 = <code>${guardBit}</code>${guardBit === '1' ? ' → round up' : ' → round down (keep bits 1–23)'}.<br>`;
    }
    if (roundNote) step5 += `<div class="rounding-note">${roundNote}</div>`;
    step5 += `<br>Final 23-bit mantissa: <code class="code-green">${bits23}</code>`;
  } else if (raw23.length <= 23) {
    step5 += `
    After the leading <code>1.</code>, the bits are: <code>${raw23 || '(none)'}</code><br>
    Fewer than 23 bits — pad with trailing zeros:<br>
    Final 23-bit mantissa: <code class="code-green">${bits23}</code>`;
  } else {
    step5 += `
    After the leading <code>1.</code>, the bits are: <code>${raw23.slice(0, 26)}…</code><br><br>
    More than 23 bits — need to cut at position 23:<br>
    <code>${raw23.slice(0,23)} | ${raw23.slice(23)}</code><br>`;
    if (roundNote) step5 += `<div class="rounding-note">${roundNote}</div>`;
    step5 += `<br>Final 23-bit mantissa: <code class="code-green">${bits23}</code>`;
  }
  step5 += `</div></div>`;

  // Assemble from the already-computed u32 (respects truncate vs round)
  const verifyBits = u32ToBitString(u32);
  const verifySign = verifyBits[0];
  const verifyExp  = verifyBits.slice(1, 9);
  const verifyMan  = verifyBits.slice(9);

  // Step 6: Assemble
  const step6 = `
<div class="step">
  <div class="step-badge">6</div>
  <div class="step-body">
    <div class="step-title">Assemble the 32 Bits</div>
    <div class="assemble-block">
      <div class="assemble-row"><span class="assemble-lbl">Sign:</span>     <span class="assemble-val"><span class="s-bit">${verifySign}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">Exponent:</span> <span class="assemble-val"><span class="e-bit">${verifyExp}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">Mantissa:</span> <span class="assemble-val"><span class="m-bit">${verifyMan}</span></span></div>
      <div style="border-top:1px solid #2e2e34; margin: 6px 0;"></div>
      <div class="assemble-row"><span class="assemble-lbl">Result:</span>   <span class="assemble-val"><span class="s-bit">${verifySign}</span> <span class="e-bit">${verifyExp}</span> <span class="m-bit">${verifyMan}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">Hex:</span>      <span class="assemble-hex">${u32ToHex(u32)}</span></div>
    </div>
  </div>
</div>`;

  return `<div class="steps-panel"><h2>Step-by-Step Conversion</h2>${step1}${step2}${step3}${step4}${step5}${step6}</div>`;
}

function buildSpecialSteps(label, bits) {
  const sign = bits[0];
  const exp  = bits.slice(1, 9);
  const man  = bits.slice(9);
  let description = '';
  if (label === 'NaN') {
    description = 'All exponent bits are <code>1</code> and the mantissa is <strong>non-zero</strong> → <strong>Not a Number (NaN)</strong>.';
  } else if (label === '+Infinity' || label === '-Infinity') {
    description = 'All exponent bits are <code>1</code> and the mantissa is all <code>0</code> → <strong>Infinity</strong>. Sign bit determines direction.';
  } else if (label === '+0' || label === '-0') {
    description = 'All exponent bits are <code>0</code> and the mantissa is all <code>0</code> → <strong>Zero</strong>. IEEE 754 has both +0 and −0.';
  }
  return `<div class="decode-panel">
    <h2>Special Value <span class="special-badge">${label}</span></h2>
    <div class="decode-row">
      <span class="decode-lbl">Pattern</span>
      <span class="decode-val">
        <span style="color:#fca5a5;">${sign}</span>
        <span style="color:#bfdbfe;"> ${exp}</span>
        <span style="color:#86efac;"> ${man}</span>
      </span>
    </div>
    <div class="decode-row">
      <span class="decode-lbl">Explanation</span>
      <span class="decode-val">${description}</span>
    </div>
  </div>`;
}

// ── Decode mode ──────────────────────────────────────────────────────────────
function decodeHex() {
  let raw = document.getElementById('hexInput').value.trim();
  if (!raw) return;

  let u32;
  // 32-char binary string?
  if (/^[01]{32}$/.test(raw)) {
    u32 = bitStringToU32(raw);
  } else {
    // Hex (strip 0x prefix)
    raw = raw.replace(/^0x/i, '').replace(/\s/g, '');
    if (!/^[0-9a-fA-F]{1,8}$/.test(raw)) {
      alert('Enter 8 hex digits (e.g. C0870000) or a 32-bit binary string.');
      return;
    }
    u32 = hexToU32(raw.padStart(8, '0'));
  }

  lastMode = 'decode';
  setBitsFromU32(u32);
  updateBitRow();
  updateSummary(u32);
  document.getElementById('decInput').value = '';
  document.getElementById('hexInput').value = u32ToHex(u32);

  showSteps(buildDecodePanel(u32));
}

function buildDecodePanel(u32) {
  const bits = u32ToBitString(u32);
  const signBit = parseInt(bits[0]);
  const expBits = bits.slice(1, 9);
  const manBits = bits.slice(9);

  const expVal = parseInt(expBits, 2);
  const manVal = parseInt(manBits, 2);
  const value  = u32ToDecimal(u32);

  // Special cases
  const isSpecialExp = expVal === 255;
  const isZeroExp    = expVal === 0;
  const isNaNVal     = isSpecialExp && manVal !== 0;
  const isInfVal     = isSpecialExp && manVal === 0;
  const isZeroVal    = isZeroExp && manVal === 0;
  const isSubnormal  = isZeroExp && manVal !== 0;

  let specialNote = '';
  let result = '';

  if (isNaNVal) {
    specialNote = '<span class="special-badge">NaN</span>';
    result = 'Not a Number. All exponent bits are 1 and mantissa is non-zero.';
  } else if (isInfVal) {
    specialNote = `<span class="special-badge">${signBit ? '−' : '+'}Infinity</span>`;
    result = 'All exponent bits are 1 and mantissa is all 0 → Infinity.';
  } else if (isZeroVal) {
    specialNote = `<span class="special-badge">${signBit ? '−0' : '+0'}</span>`;
    result = 'All exponent and mantissa bits are 0 → Zero.';
  } else if (isSubnormal) {
    specialNote = '<span class="special-badge">Subnormal</span>';
    const actualExp = -126; // fixed exponent for subnormals
    const mantFrac = parseInt(manBits, 2) / Math.pow(2, 23);
    result = `Subnormal (denormalized) number. Exponent = ${actualExp}, value = ±0.${manBits} × 2<sup>−126</sup> = ${value}`;
  } else {
    const actualExp = expVal - 127;
    // mantissa fractional value
    const mantFrac = parseInt(manBits, 2) / Math.pow(2, 23);
    const significand = 1 + mantFrac;
    result = `${signBit ? '−' : '+'}${significand.toPrecision(8)} × 2<sup>${actualExp}</sup> = <strong>${value}</strong>`;
  }

  let html = `<div class="decode-panel"><h2>Decode${specialNote}</h2>`;

  html += `<div class="decode-row">
    <span class="decode-lbl">Bits</span>
    <span class="decode-val">
      <span style="color:#fca5a5;">${bits[0]}</span>
      <span style="color:#bfdbfe;"> ${expBits}</span>
      <span style="color:#86efac;"> ${manBits}</span>
    </span>
  </div>`;

  html += `<div class="decode-row">
    <span class="decode-lbl">Sign bit</span>
    <span class="decode-val"><code>${signBit}</code> → ${signBit ? 'negative' : 'positive'}</span>
  </div>`;

  html += `<div class="decode-row">
    <span class="decode-lbl">Exponent bits</span>
    <span class="decode-val"><code>${expBits}</code> = ${expVal}${isSpecialExp ? ' (special — all 1s)' : isZeroExp ? ' (special — all 0s)' : ` → ${expVal} − 127 = <strong>${expVal - 127}</strong>`}</span>
  </div>`;

  html += `<div class="decode-row">
    <span class="decode-lbl">Mantissa bits</span>
    <span class="decode-val"><code>${manBits}</code>${isSpecialExp || isZeroVal ? '' : ` → ${isSubnormal ? '0' : '1'}.${manBits} (binary fraction)`}</span>
  </div>`;

  if (!isNaNVal && !isInfVal && !isZeroVal) {
    if (isSubnormal) {
      html += `<div class="decode-row">
        <span class="decode-lbl">Form</span>
        <span class="decode-val">0.${manBits} × 2<sup>−126</sup> (subnormal: no implicit leading 1)</span>
      </div>`;
    } else {
      const actualExp = expVal - 127;
      html += `<div class="decode-row">
        <span class="decode-lbl">Form</span>
        <span class="decode-val">${signBit ? '−' : '+'}1.${manBits} × 2<sup>${actualExp}</sup></span>
      </div>`;
    }
  }

  html += `<div class="decode-row">
    <span class="decode-lbl">Result</span>
    <span class="decode-val">${result}</span>
  </div>`;

  html += '</div>';
  return html;
}

// ── Event wiring ─────────────────────────────────────────────────────────────
document.getElementById('convertBtn').addEventListener('click', convertDecimal);
document.getElementById('decodeBtn').addEventListener('click', decodeHex);

document.getElementById('decInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') convertDecimal();
});
document.getElementById('hexInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') decodeHex();
});

document.getElementById('roundMode').addEventListener('change', () => {
  if (lastMode === 'decimal' && lastDecimalValue !== null) {
    const mode = document.getElementById('roundMode').value;
    const u32 = decimalToU32WithMode(lastDecimalValue, mode);
    setBitsFromU32(u32);
    updateBitRow();
    updateSummary(u32, lastDecimalValue);
    document.getElementById('hexInput').value = u32ToHex(u32);
    showSteps(buildSteps(lastDecimalValue, mode));
  }
});

// ── Initial render ───────────────────────────────────────────────────────────
buildBitRow();
// Default: convert -16.75 on load
convertDecimal();
</script>
