<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IEEE 754 Float Converter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    font-size: 15px;
    background: #1e1e22;
    color: #cccccc;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  a.back-link {
    display: inline-block;
    font-size: 0.82rem;
    font-weight: 600;
    color: #888890;
    text-decoration: none;
    margin-bottom: 16px;
    padding: 6px 12px;
    background: #252528;
    border: 1px solid #383840;
    border-radius: 8px;
    transition: color 0.15s, border-color 0.15s;
  }
  a.back-link:hover { color: #22c55e; border-color: #22c55e; }

  h1 {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 700;
    color: #eeeeee;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .subtitle {
    text-align: center;
    color: #666670;
    font-size: 0.9rem;
    margin-bottom: 32px;
  }

  /* ── Input row ── */
  .input-section {
    max-width: 1000px;
    margin: 0 auto 28px;
    background: #252528;
    border-radius: 12px;
    padding: 20px 24px;
    border: 1px solid #2e2e34;
  }

  .input-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .input-group {
    flex: 1;
    min-width: 220px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-group label {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888890;
  }

  .input-with-btn {
    display: flex;
    gap: 8px;
  }

  .input-with-btn input {
    flex: 1;
    background: #13131a;
    color: #eeeeee;
    border: 1px solid #383840;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.92rem;
    font-family: 'Consolas', 'Courier New', monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-with-btn input:focus { border-color: #22c55e; }

  button.convert-btn {
    background: #383840;
    color: #cccccc;
    border: 1px solid #505055;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  button.convert-btn:hover { background: #22c55e; color: #111; border-color: #22c55e; }

  .rounding-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: #888890;
    border-top: 1px solid #383840;
    padding-top: 12px;
  }
  .rounding-heading { font-weight: 700; color: #666670; font-size: 0.82rem; }
  .rounding-row select { background:#383840; color:#cccccc; border:2px solid #505055; border-radius:8px; padding:4px 8px; font-size:0.82rem; cursor:pointer; }

  /* ── Bit display ── */
  .bit-section {
    max-width: 1000px;
    margin: 0 auto 20px;
    background: #252528;
    border-radius: 12px;
    padding: 20px 20px 16px;
    border: 1px solid #2e2e34;
    overflow: hidden;
  }
  .bit-scroll { overflow-x: auto; padding-bottom: 6px; text-align: center; }
  .bit-inner  { display: inline-flex; flex-direction: column; align-items: flex-start; }

  .bit-row {
    display: flex;
    gap: 10px;
    flex-wrap: nowrap;
    padding-bottom: 4px;
  }
  .bit-group { display: flex; gap: 2px; }

  .bit-box {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    font-family: 'Consolas', 'Courier New', monospace;
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, color 0.12s, transform 0.08s;
    flex-shrink: 0;
    position: relative;
  }
  .bit-box:hover { transform: translateY(-2px); }
  .bit-box:active { transform: translateY(0); }

  /* sign */
  .bit-box.sign-0 { background: #3b0a0a; color: #cc7070; border: 1px solid #5a1a1a; }
  .bit-box.sign-1 { background: #9b1c1c; color: #fca5a5; border: 1px solid #dc2626; }

  /* exponent */
  .bit-box.exp-0 { background: #0f2040; color: #6090cc; border: 1px solid #1e3a6a; }
  .bit-box.exp-1 { background: #1d4ed8; color: #bfdbfe; border: 1px solid #3b82f6; }

  /* mantissa */
  .bit-box.man-0 { background: #0a2214; color: #4a9a6a; border: 1px solid #1a4a2a; }
  .bit-box.man-1 { background: #15803d; color: #86efac; border: 1px solid #22c55e; }

  .bit-labels {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    font-size: 0.72rem;
    color: #666670;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    user-select: none;
  }
  .bit-label-sign  { width: 24px; text-align: center; flex-shrink: 0; }
  .bit-label-exp   { width: calc(8 * 24px + 7 * 2px); text-align: center; color: #4a7acc; flex-shrink: 0; }
  .bit-label-man   { width: calc(23 * 24px + 22 * 2px); text-align: center; color: #22c55e; flex-shrink: 0; }

  /* tooltip */
  .bit-box::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #13131a;
    color: #cccccc;
    font-size: 0.65rem;
    font-family: 'Segoe UI', sans-serif;
    font-weight: normal;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 5px;
    border: 1px solid #383840;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 10;
  }
  .bit-box:hover::after { opacity: 1; }

  /* ── Summary bar ── */
  .summary-bar {
    max-width: 1000px;
    margin: 0 auto 20px;
    background: #13131a;
    border-radius: 10px;
    padding: 12px 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
    border: 1px solid #2e2e34;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.88rem;
  }
  .summary-item { display: flex; gap: 8px; align-items: baseline; }
  .summary-label { color: #666670; font-size: 0.78rem; font-family: 'Segoe UI', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-value { color: #eeeeee; font-weight: 600; }
  .summary-value.special { color: #f59e0b; }

  /* ── Steps panel ── */
  .steps-section {
    max-width: 1000px;
    margin: 0 auto;
    display: none;
  }
  .period-note {
    margin-top: 8px;
    padding: 8px 12px;
    background: #1a2a1a;
    border: 1px solid #2a4a2a;
    border-radius: 6px;
    font-size: 0.88rem;
    color: #86efac;
  }
  .steps-section.visible { display: block; }

  .steps-panel {
    background: #252528;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #2e2e34;
  }

  .steps-panel h2 {
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666670;
    margin-bottom: 18px;
  }

  .step {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #2e2e34;
  }
  .step:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .step-badge {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    background: #383840;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: #888890;
    margin-top: 2px;
  }

  .step-body {
    flex: 1;
    min-width: 0; /* allow flex child to shrink so overflow-x:auto works inside */
    font-size: 0.95rem;
    line-height: 1.7;
  }

  .step-body strong { color: #eeeeee; }
  .step-body code {
    font-family: 'Consolas', 'Courier New', monospace;
    background: #13131a;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.86em;
    color: #86efac;
  }
  .step-body .code-red { color: #fca5a5; }
  .step-body .code-blue { color: #bfdbfe; }
  .step-body .code-green { color: #86efac; }

  .step-title {
    font-weight: 700;
    color: #eeeeee;
    margin-bottom: 6px;
  }

  /* conversion tables */
  .conv-table {
    border-collapse: collapse;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.82rem;
    margin: 8px 0;
  }
  .conv-table th {
    color: #666670;
    font-weight: 700;
    font-family: 'Segoe UI', sans-serif;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 10px 4px 0;
    text-align: left;
    border-bottom: 1px solid #383840;
  }
  .conv-table td {
    padding: 3px 10px 3px 0;
    color: #cccccc;
  }
  .conv-table td:last-child { color: #86efac; }

  .assemble-block {
    background: #13131a;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 0.84rem;
    margin-top: 8px;
    line-height: 1.9;
    overflow-x: auto;
  }
  .assemble-row { display: flex; gap: 12px; min-width: max-content; }
  .assemble-lbl { color: #666670; min-width: 90px; flex-shrink: 0; }
  .assemble-val { color: #eeeeee; white-space: nowrap; }
  .assemble-val .s-bit { color: #fca5a5; }
  .assemble-val .e-bit { color: #bfdbfe; }
  .assemble-val .m-bit { color: #86efac; }
  .assemble-hex { color: #f59e0b; font-weight: 700; }

  .decode-panel {
    background: #252528;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #2e2e34;
  }
  .decode-panel h2 {
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666670;
    margin-bottom: 18px;
  }

  .decode-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .decode-lbl {
    color: #666670;
    font-weight: 700;
    min-width: 140px;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding-top: 2px;
  }
  .decode-val { color: #cccccc; }
  .decode-val code {
    font-family: 'Consolas', 'Courier New', monospace;
    background: #13131a;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.86em;
    color: #86efac;
  }

  .special-badge {
    display: inline-block;
    background: #451a03;
    color: #f59e0b;
    border: 1px solid #854d0e;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-left: 8px;
  }

  .rounding-note {
    background: #1a1a2e;
    border: 1px solid #2d2d6a;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.82rem;
    color: #9090cc;
    margin-top: 8px;
  }

  .header-row {
    max-width: 1000px;
    margin: 0 auto 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .lang-label { font-size:0.78rem; color:#888890; display:flex; align-items:center; gap:6px; }
  #langSelect  { background:#383840; color:#cccccc; border:2px solid #505055; border-radius:8px; padding:4px 8px; font-size:0.82rem; cursor:pointer; }
  /* iOS Safari zooms on focus when font-size < 16px */
  input, select { font-size: 16px !important; }
</style>
</head>
<body>

<div class="header-row">
  <a class="back-link" href="index.html" id="backLink">← Back</a>
  <label class="lang-label">Language:
    <select id="langSelect" onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="de">DE</option>
    </select>
  </label>
</div>

<h1 id="pageTitle">IEEE 754 Float Converter</h1>
<p class="subtitle" id="subtitle">Explore how decimal numbers are represented as 32-bit single-precision floats</p>

<!-- Input section -->
<div class="input-section">
  <div class="input-row">
    <div class="input-group">
      <label for="decInput" id="labelDecimal">Decimal</label>
      <div class="input-with-btn">
        <input type="text" id="decInput" value="" placeholder="e.g. -16.75" />
        <button class="convert-btn" id="convertBtn">Convert →</button>
      </div>
    </div>
    <div class="input-group" style="flex:2; min-width:300px;">
      <label for="hexInput" id="labelBinary">Binary</label>
      <div class="input-with-btn">
        <input type="text" id="hexInput" placeholder="32 bits, e.g. 11000001100001100000000000000000" style="font-size:0.78rem;" />
        <button class="convert-btn" id="decodeBtn">← From Bits</button>
      </div>
    </div>
  </div>
  <div class="rounding-row">
    <span class="rounding-heading" id="roundingHeading">Mantissa overflow:</span>
    <select id="roundMode">
      <option value="truncate" id="optTruncate" selected>Truncate (cut off)</option>
      <option value="round"    id="optRound">Round (half-to-even)</option>
    </select>
  </div>
</div>

<!-- Bit display -->
<div class="bit-section">
  <div class="bit-scroll">
    <div class="bit-inner">
      <div class="bit-row">
        <div class="bit-group" id="bitGroupSign"></div>
        <div class="bit-group" id="bitGroupExp"></div>
        <div class="bit-group" id="bitGroupMan"></div>
      </div>
      <div class="bit-labels">
        <div class="bit-label-sign" id="bitLabelSign" style="color:#f87171;">Sign<br>(1)</div>
        <div class="bit-label-exp" id="bitLabelExp">Exponent (8 bits)</div>
        <div class="bit-label-man" id="bitLabelMan">Mantissa (23 bits)</div>
      </div>
    </div>
  </div>
</div>

<!-- Summary bar -->
<div class="summary-bar">
  <div class="summary-item">
    <span class="summary-label" id="sumLabelValue">Value</span>
    <span class="summary-value" id="sumValue">—</span>
  </div>
  <div class="summary-item">
    <span class="summary-label" id="sumLabelHex">Hex</span>
    <span class="summary-value" id="sumHex">—</span>
  </div>
  <div class="summary-item">
    <span class="summary-label" id="sumLabelBin">Binary</span>
    <span class="summary-value" id="sumBinary" style="font-size:0.78rem; word-break:break-all;">—</span>
  </div>
  <div class="summary-item">
    <span class="summary-label" id="sumLabelError">Error</span>
    <span class="summary-value" id="sumError">—</span>
  </div>
</div>

<!-- Steps / Decode panel -->
<div class="steps-section" id="stepsSection">
  <div id="stepsInner"></div>
</div>

<script>
// ── Language ─────────────────────────────────────────────────────────────────
let lang = localStorage.getItem('lang') || 'en';

const STRINGS = {
  en: {
    back:'← Tools', pageTitle:'IEEE 754 Float Converter',
    subtitle:'Explore how decimal numbers are represented as 32-bit single-precision floats',
    labelDecimal:'Decimal', labelBinary:'Binary',
    btnConvert:'Convert →', btnFromBits:'← From Bits',
    roundingHeading:'Mantissa overflow:',
    optTruncate:'Truncate (cut off)', optRound:'Round (half-to-even)',
    bitSign:'Sign<br>(1)', bitExp:'Exponent (8 bits)', bitMan:'Mantissa (23 bits)',
    sumValue:'Value', sumHex:'Hex', sumBin:'Binary', sumError:'Error',
    // Tables
    col2:'÷ 2', colQ:'Quotient', colR:'Remainder',
    readBtT: b => `Read remainders bottom-to-top: <code>${b}</code>`,
    colVal:'Value', colX2:'× 2', colBit:'Bit',
    readTtB: b => `Read bits top-to-bottom: <code>.${b}</code>`,
    repsEll:'⋯ repeats ⋯',
    repFracTitle:'Repeating binary fraction',
    repFracBlock: (p,n) => `the block <code>${p}</code> (length ${n}) repeats indefinitely.`,
    noExact: f => `0.${f} has <strong>no exact binary representation</strong>.`,
    // Rounding notes
    truncNote: b => `Truncate mode: drop bits after position 23 (<code>${b}</code>).`,
    roundDownNote: (g,t) => `Guard bit = <code>${g}</code>, tail = <code>${t||'(empty)'}</code> → round down (keep bits 1–23).`,
    roundUpNote: (g,t,l,ov) => `Guard bit = <code>${g}</code>, tail = <code>${t||'(empty)'}</code>, LSB = <code>${l}</code> → round up. Adding 1 to mantissa${ov?' caused overflow (exponent increments by 1)':''}.`,
    // Step titles
    tSign:'Sign Bit',
    tConvert: (v,a) => `Convert |${v}| = ${a} to Binary`,
    tNorm:'Normalized Scientific Representation',
    tBias:'Biased Exponent',
    tMant:'Mantissa (Significand)',
    tAssemble:'Assemble the 32 Bits',
    // Step bodies
    pos:'positive', neg:'negative',
    signIs: (w,b,c) => `The number is <strong>${w}</strong> → sign bit = <code class="${c}">${b}</code>`,
    intPart: n => `Integer part (${n}):`,
    fracPart: f => `Fractional part (${f}):`,
    normForm:'Write in the form <code>1.xxx × 2<sup>n</sup></code>:<br><br>',
    shiftL: n => `<span style="color:#666670;font-size:0.85rem;">(Shift binary point left ${n} place${n!==1?'s':''})</span>`,
    shiftR: n => `<span style="color:#666670;font-size:0.85rem;">(Shift binary point right ${-n} place${n!==-1?'s':''})</span>`,
    mantPeriod: (p,n) => `<div class="period-note">♻ The mantissa bits after the <code>1.</code> repeat with period <code>${p}</code> (length ${n}) — infinite, so IEEE 754 stores only 23 bits (step 5).</div>`,
    biasAdd: e => `Exponent = <strong>${e}</strong>. Add bias 127:<br>`,
    biasConvert: n => `Convert ${n} to 8-bit binary:<br>`,
    biasResult:'8-bit exponent:',
    m5RepForever: p => `After the leading <code>1.</code>, the mantissa is <code>(${p})</code> repeating forever.<br><br>`,
    m5Store23:'IEEE 754 stores exactly <strong>23 bits</strong>. We extend the repeating pattern to get them:<br>',
    m5Marker:`<span style="color:#666670;font-size:0.88rem;">(the <code>|</code> marks where bit 23 ends; bits to the right are dropped or used for rounding)</span><br><br>`,
    m5Trunc:'<strong>Truncate:</strong> keep the first 23 bits, drop the rest.<br>',
    m5Round: g => `<strong>Round (half-to-even):</strong> bit 24 = <code>${g}</code>${g==='1'?' → round up':' → round down (keep bits 1–23)'}.<br>`,
    m5Short: b => `After the leading <code>1.</code>, the bits are: <code>${b||'(none)'}</code><br>Fewer than 23 bits — pad with trailing zeros:<br>`,
    m5Long:  b => `After the leading <code>1.</code>, the bits are: <code>${b}…</code><br><br>More than 23 bits — need to cut at position 23:<br>`,
    m5RoundHdr:'<strong>Round (half-to-even):</strong><br>',
    m5Final:'Final 23-bit mantissa:',
    aSign:'Sign:', aExp:'Exponent:', aMan:'Mantissa:', aRes:'Result:', aHex:'Hex:',
    stepByStep:'Step-by-Step Conversion',
    // Subnormal
    tSubRecog:'Recognize Subnormal (Denormalized)',
    tSubComp:'Compute the Mantissa Bits',
    tSubStore:'Store 23 Mantissa Bits',
    subBadge:'Subnormal',
    subSmaller: v => `|value| = <code>${v}</code> is smaller than the minimum normal float`,
    subMinNorm:'<code>2<sup>−126</sup> ≈ 1.17549 × 10<sup>−38</sup></code>.',
    subCantNorm:'Normalized form <code>1.xxx × 2<sup>n</sup></code> would need <code>n &lt; −126</code>, which the 8-bit biased exponent cannot encode.<br><br>',
    subUses:'IEEE 754 uses the <strong>subnormal (denormalized) encoding</strong> instead:',
    subFields:[
      'Exponent field = <code class="code-blue">00000000</code> (all zeros — the subnormal signal)',
      'The implicit leading bit is <strong>0</strong> instead of 1',
      'Fixed effective exponent is always <strong>−126</strong>',
      'Value = <code>(−1)<sup>s</sup> × <span style="color:#86efac">0.mantissa</span> × 2<sup>−126</sup></code>',
    ],
    subMantFrom: (v,m) => `From the subnormal form: <code>0.mantissa × 2<sup>−126</sup> = ${v}</code><br>Rearrange: <code>0.mantissa = ${v} × 2<sup>126</sup> ≈ ${m}</code><br><br>Convert this to binary using repeated doubling:<br>`,
    subRepPeriod: p => `The mantissa fraction repeats: <code>(${p})</code>.<br><br>Extend the repeating pattern to 26 bits:<br>`,
    subTrunc:'<strong>Truncate:</strong> keep the first 23 bits, drop the rest.<br>',
    subRound: g => `<strong>Round (half-to-even):</strong> guard bit = <code>${g}</code>${g==='1'?' → round up':' → round down (keep bits 1–23)'}.<br>`,
    subShort: b => `Mantissa bits: <code>${b||'(none)'}</code><br>Fewer than 23 bits — pad with trailing zeros:<br>`,
    subLong:  b => `Mantissa bits: <code>${b}…</code><br>More than 23 bits — cut at position 23:<br>`,
    subRoundHdr:'<strong>Round (half-to-even):</strong><br>',
    subFinal:'Final 23-bit mantissa:',
    subExpNote:'(all zeros = subnormal)',
    // Special values
    specialTitle:'Special Value',
    specialPat:'Pattern', specialExpl:'Explanation',
    nanDesc:'All exponent bits are <code>1</code> and the mantissa is <strong>non-zero</strong> → <strong>Not a Number (NaN)</strong>.',
    infDesc:'All exponent bits are <code>1</code> and the mantissa is all <code>0</code> → <strong>Infinity</strong>. Sign bit determines direction.',
    zeroDesc:'All exponent bits are <code>0</code> and the mantissa is all <code>0</code> → <strong>Zero</strong>. IEEE 754 has both +0 and −0.',

// ── Core bit-level utilities ─────────────────────────────────────────────────
const buf = new ArrayBuffer(4);
const _f32 = new Float32Array(buf);
const _u32 = new Uint32Array(buf);

function decimalToU32(value) {
  _f32[0] = value;
  return _u32[0] >>> 0;
}
function u32ToDecimal(u32) {
  _u32[0] = u32;
  return _f32[0];
}
function u32ToBitString(u32) {
  return (u32 >>> 0).toString(2).padStart(32, '0');
}
function bitStringToU32(s) {
  return parseInt(s, 2) >>> 0;
}
function u32ToHex(u32) {
  return (u32 >>> 0).toString(16).toUpperCase().padStart(8, '0');
}
function hexToU32(hex) {
  return parseInt(hex, 16) >>> 0;
}

// ── State ────────────────────────────────────────────────────────────────────
let currentBits = new Array(32).fill(0); // bit[0] = sign (MSB), bit[31] = LSB
let lastMode = null; // 'decimal' | 'decode'
let lastDecimalValue = null;

// ── Bit display ──────────────────────────────────────────────────────────────
function makeBox(i) {
  const box = document.createElement('div');
  const bitPos = 31 - i;
  const cls = i === 0 ? 'sign' : i <= 8 ? 'exp' : 'man';
  box.className = 'bit-box ' + cls + '-' + currentBits[i];
  box.textContent = currentBits[i];
  box.dataset.tip = 'bit ' + bitPos;
  box.addEventListener('click', () => toggleBit(i));
  return box;
}

function buildBitRow() {
  const gs = document.getElementById('bitGroupSign');
  const ge = document.getElementById('bitGroupExp');
  const gm = document.getElementById('bitGroupMan');
  gs.innerHTML = ''; ge.innerHTML = ''; gm.innerHTML = '';
  gs.appendChild(makeBox(0));
  for (let i = 1; i <= 8; i++) ge.appendChild(makeBox(i));
  for (let i = 9; i < 32; i++) gm.appendChild(makeBox(i));
}

function updateBitRow() {
  const boxes = document.querySelectorAll('.bit-group .bit-box');
  boxes.forEach((box, i) => {
    const cls = i === 0 ? 'sign' : i <= 8 ? 'exp' : 'man';
    box.className = 'bit-box ' + cls + '-' + currentBits[i];
    box.textContent = currentBits[i];
  });
}

function setBitsFromU32(u32) {
  const s = u32ToBitString(u32);
  for (let i = 0; i < 32; i++) currentBits[i] = parseInt(s[i]);
}

function bitsToU32() {
  return bitStringToU32(currentBits.join(''));
}

function toggleBit(idx) {
  currentBits[idx] ^= 1;
  updateBitRow();
  const u32 = bitsToU32();
  updateSummary(u32);
  document.getElementById('hexInput').value = u32ToBitString(u32);
  document.getElementById('decInput').value = '';
  lastMode = null;
  hideSteps();
}

// ── Summary bar ──────────────────────────────────────────────────────────────
function updateSummary(u32, origValue = null) {
  const val = u32ToDecimal(u32);
  document.getElementById('sumHex').textContent = u32ToHex(u32);
  document.getElementById('sumBinary').textContent = u32ToBitString(u32);
  const valEl = document.getElementById('sumValue');
  const errEl = document.getElementById('sumError');
  if (isNaN(val)) {
    valEl.textContent = 'NaN'; valEl.className = 'summary-value special';
    errEl.textContent = '—';
  } else if (!isFinite(val)) {
    valEl.textContent = val > 0 ? '+Infinity' : '-Infinity'; valEl.className = 'summary-value special';
    errEl.textContent = '—';
  } else if (Object.is(val, -0)) {
    valEl.textContent = '-0'; valEl.className = 'summary-value special';
    errEl.textContent = '—';
  } else if (val === 0) {
    valEl.textContent = '+0'; valEl.className = 'summary-value special';
    errEl.textContent = origValue !== null ? (origValue >= 0 ? '+0' : '−0') : '—';
  } else {
    valEl.textContent = val; valEl.className = 'summary-value';
    if (origValue !== null && isFinite(origValue)) {
      const err = val - origValue;
      errEl.textContent = (err >= 0 ? '+' : '') + err.toPrecision(4);
      errEl.className = err !== 0 ? 'summary-value special' : 'summary-value';
    } else {
      errEl.textContent = '—'; errEl.className = 'summary-value';
    }
  }
}

// ── Steps helpers ────────────────────────────────────────────────────────────
function hideSteps() {
  document.getElementById('stepsSection').classList.remove('visible');
}
function showSteps(html) {
  document.getElementById('stepsInner').innerHTML = html;
  document.getElementById('stepsSection').classList.add('visible');
}

// ── Integer → binary (repeated division) ─────────────────────────────────────
function intToBinaryTable(n) {
  // Returns { bits: "10001", rows: [{n, quotient, remainder}, ...] }
  if (n === 0) return { bits: '0', rows: [] };
  const rows = [];
  let x = n;
  while (x > 0) {
    const q = Math.floor(x / 2);
    const r = x % 2;
    rows.push({ n: x, quotient: q, remainder: r });
    x = q;
  }
  const bits = rows.map(r => r.remainder).reverse().join('');
  return { bits, rows };
}

function intToBinTableHtml(n, label) {
  const { bits, rows } = intToBinaryTable(n);
  if (rows.length === 0) return { bits: '0', html: '<p><code>0</code> → <code>0</code></p>' };
  let html = `<table class="conv-table"><thead><tr><th>${S().col2}</th><th>${S().colQ}</th><th>${S().colR}</th></tr></thead><tbody>`;
  for (const r of rows) {
    html += `<tr><td>${r.n}</td><td>${r.quotient}</td><td>${r.remainder}</td></tr>`;
  }
  html += '</tbody></table>';
  html += `<div style="font-size:0.8rem; color:#666670; margin-top:4px;">${S().readBtT(bits)}</div>`;
  return { bits, html };
}

// ── Detect repeating period in a bit string ───────────────────────────────────
function detectPeriod(bits) {
  const n = bits.length;
  for (let off = 0; off <= 4; off++) {
    for (let pLen = 1; pLen <= 16; pLen++) {
      const period = bits.slice(off, off + pLen);
      if (period.length < pLen) continue;
      let ok = true;
      for (let i = off; i < n; i++) {
        if (bits[i] !== period[(i - off) % pLen]) { ok = false; break; }
      }
      if (ok && n - off >= 2 * pLen) return { offset: off, period };
    }
  }
  return null;
}

// ── Fraction → binary (repeated multiplication) ───────────────────────────────
function fracToBinary(frac, maxBits) {
  // Returns string of bits (no leading "0.")
  const bits = [];
  let f = frac;
  for (let i = 0; i < maxBits; i++) {
    f *= 2;
    if (f >= 1) { bits.push(1); f -= 1; }
    else { bits.push(0); }
    if (f === 0) break;
  }
  return bits.join('');
}

function fracToBinTableHtml(frac, maxBits) {
  const rows = [];
  let f = frac;
  for (let i = 0; i < maxBits; i++) {
    const p = f * 2;
    const bit = p >= 1 ? 1 : 0;
    rows.push({ val: f.toPrecision(8), product: p.toPrecision(8), bit });
    f = bit === 1 ? p - 1 : p;
    if (f === 0) break;
  }
  const bits = rows.map(r => r.bit).join('');
  const isExact = (f === 0); // fraction terminated — no period, even if bits repeat by coincidence
  const pd = isExact ? null : detectPeriod(bits);

  // Cap table rows: if period found, show prefix + 2 full periods; else show all
  const showRows = pd
    ? Math.min(rows.length, pd.offset + 2 * pd.period.length)
    : rows.length;

  let html = `<table class="conv-table"><thead><tr><th>${S().colVal}</th><th>${S().colX2}</th><th>${S().colBit}</th></tr></thead><tbody>`;
  for (let i = 0; i < showRows; i++) {
    const r = rows[i];
    const mark = pd && i === pd.offset ? ' style="border-top:2px solid #22c55e;"' : '';
    html += `<tr${mark}><td>${r.val}</td><td>${r.product}</td><td>${r.bit}</td></tr>`;
  }
  if (pd) html += `<tr><td colspan="3" style="color:#666670; text-align:center;">${S().repsEll}</td></tr>`;
  html += '</tbody></table>';

  if (pd) {
    const pre = bits.slice(0, pd.offset);
    html += `<div class="period-note">
      ♻ <strong>${S().repFracTitle}</strong><br>
      0.${pre ? pre + '<span style="border-bottom:2px solid #22c55e;">' + pd.period + '</span>' : '<span style="border-bottom:2px solid #22c55e;">' + pd.period + '</span>'}…
      &nbsp;— ${S().repFracBlock(pd.period, pd.period.length)}
      <br>${S().noExact(frac)}
    </div>`;
  } else {
    html += `<div style="font-size:0.85rem; color:#666670; margin-top:4px;">${S().readTtB(bits)}</div>`;
  }
  return { bits, html, period: pd };
}

// ── Decimal → u32 with explicit truncate vs round ───────────────────────────
function decimalToU32WithMode(value, mode) {
  // Special values and round mode: defer to Float32Array (authoritative)
  if (!isFinite(value) || value === 0 || isNaN(value) || mode === 'round') {
    _f32[0] = value;
    return _u32[0] >>> 0;
  }
  // Truncate: extract top 23 mantissa bits from the 64-bit double directly
  const negative = value < 0;
  const absVal = Math.abs(value);
  const dv = new DataView(new ArrayBuffer(8));
  dv.setFloat64(0, absVal, false); // big-endian
  const hi = dv.getUint32(0, false);
  const lo = dv.getUint32(4, false);
  const doubleExpBiased = (hi >>> 20) & 0x7FF;
  if (doubleExpBiased === 0 || doubleExpBiased === 0x7FF) {
    // subnormal double, NaN, Inf: fall back to Float32Array
    _f32[0] = value; return _u32[0] >>> 0;
  }
  const doubleExp = doubleExpBiased - 1023;
  const f32ExpBiased = doubleExp + 127;
  if (f32ExpBiased >= 255) return negative ? 0xFF800000 : 0x7F800000; // overflow → Inf
  if (f32ExpBiased <= 0) {
    // Subnormal f32: exponent field = 0, fixed effective exponent −126
    // Truncate: take floor(|value| × 2^149) as the 23-bit mantissa
    const mant23 = Math.min(0x7FFFFF, Math.floor(absVal * Math.pow(2, 149)));
    return (((negative ? 1 : 0) << 31) | mant23) >>> 0;
  }
  // Top 23 bits of the 52-bit double mantissa (bits 51..29)
  // hi[19..0] = mantissa bits 51..32, lo[31..0] = mantissa bits 31..0
  const mant23 = (((hi & 0x000FFFFF) << 3) | (lo >>> 29)) & 0x7FFFFF;
  return (((negative ? 1 : 0) << 31) | (f32ExpBiased << 23) | mant23) >>> 0;
}

// ── Round 23-bit mantissa ────────────────────────────────────────────────────
function applyRounding(mantBits, mode) {
  // mantBits: string longer than 23 chars (raw mantissa including guard bits)
  // Returns { bits23: string of 23, overflow: bool, note: string }
  if (mantBits.length <= 23) {
    return { bits23: mantBits.padEnd(23, '0'), overflow: false, note: null };
  }
  const kept = mantBits.slice(0, 23);
  const guard = mantBits[23]; // first dropped bit
  const tail  = mantBits.slice(24);

  if (mode === 'truncate') {
    return { bits23: kept, overflow: false, note: S().truncNote(mantBits.slice(23)) };
  }
  // Round half-to-even
  const guardBit = parseInt(guard, 10);
  const tailHasOnes = tail.indexOf('1') !== -1;
  const lsb = parseInt(kept[22], 10); // the 23rd bit (LSB of kept)
  const shouldRoundUp = guardBit === 1 && (tailHasOnes || lsb === 1);

  if (!shouldRoundUp) {
    return { bits23: kept, overflow: false, note: S().roundDownNote(guard, tail) };
  }
  // Add 1 to 23-bit integer
  let val = parseInt(kept, 2) + 1;
  const overflow = val >= (1 << 23);
  const bits23 = (val & 0x7FFFFF).toString(2).padStart(23, '0');
  return { bits23, overflow, note: S().roundUpNote(guard, tail, lsb, overflow) };
}

// ── Expand repeating mantissa to a fixed length ──────────────────────────────
function expandPeriod(bits, pd, totalLen) {
  if (!pd) return bits.slice(0, totalLen).padEnd(totalLen, '0');
  let out = bits.slice(0, pd.offset);
  while (out.length < totalLen) out += pd.period;
  return out.slice(0, totalLen);
}

// ── Decimal conversion with steps ───────────────────────────────────────────
function convertDecimal() {
  const raw = document.getElementById('decInput').value.trim();
  if (!raw) return;
  const value = parseFloat(raw);
  if (isNaN(value)) {
    alert('Please enter a valid decimal number.');
    return;
  }
  lastDecimalValue = value;
  lastMode = 'decimal';

  const mode = document.getElementById('roundMode').value;
  const u32 = decimalToU32WithMode(value, mode);
  setBitsFromU32(u32);
  updateBitRow();
  updateSummary(u32, value);
  document.getElementById('hexInput').value = u32ToBitString(u32);

  // Build steps
  const stepsHtml = buildSteps(value, mode);
  showSteps(stepsHtml);
}

function buildSteps(value, mode) {
  const u32 = decimalToU32WithMode(value, mode);
  const bits = u32ToBitString(u32);

  // Special cases
  if (isNaN(value)) return buildSpecialSteps('NaN', bits);
  if (!isFinite(value)) return buildSpecialSteps(value > 0 ? '+Infinity' : '-Infinity', bits);
  if (value === 0) return buildSpecialSteps(Object.is(value, -0) ? '-0' : '+0', bits);
  if (Math.abs(value) < Math.pow(2, -126)) return buildSubnormalSteps(value, mode, u32);

  const negative = value < 0;
  const absVal = Math.abs(value);
  const intPart = Math.floor(absVal);
  const fracPart = absVal - intPart;

  // Step 1: sign
  const signBit = negative ? 1 : 0;
  const signWord = negative ? S().neg : S().pos;
  const signCls  = negative ? 'code-red' : 'code-green';
  const step1 = `
<div class="step">
  <div class="step-badge">1</div>
  <div class="step-body">
    <div class="step-title">${S().tSign}</div>
    ${S().signIs(signWord, signBit, signCls)}
  </div>
</div>`;

  // Step 2: integer and fraction parts to binary
  const { bits: intBits, html: intTableHtml } = intToBinTableHtml(intPart, 'Integer');
  const { bits: fracBits, html: fracTableHtml, period: fracPeriod } = fracPart > 0
    ? fracToBinTableHtml(fracPart, 30)
    : { bits: '', html: '', period: null };

  const binaryRep = (intBits === '0' ? '0' : intBits) + (fracBits ? '.' + fracBits : '');
  function binaryRepCompact() {
    if (!fracPeriod) return binaryRep;
    const pre = fracBits.slice(0, fracPeriod.offset);
    return (intPart > 0 ? intBits : '0') + '.' + (pre || '') + '(' + fracPeriod.period + ')';
  }
  const fracPartStr = fracPart > 0 ? fracPart.toPrecision(8).replace(/\.?0+$/, '') : '';
  const step2 = `
<div class="step">
  <div class="step-badge">2</div>
  <div class="step-body">
    <div class="step-title">${S().tConvert(value, absVal)}</div>
    <strong>${S().intPart(intPart)}</strong><br>
    ${intTableHtml}
    ${fracPart > 0 ? `<br><strong>${S().fracPart(fracPartStr)}</strong><br>${fracTableHtml}` : ''}
    <br><strong>${fracPeriod ? binaryRepCompact() : binaryRep}</strong>
  </div>
</div>`;

  // Step 3: Normalize
  let exponent, mantissaRaw;
  if (intPart > 0) {
    exponent = intBits.length - 1;
    mantissaRaw = intBits.slice(1) + fracBits;
  } else {
    const firstOne = fracBits.indexOf('1');
    if (firstOne === -1) {
      return buildSpecialSteps('+0', u32ToBitString(decimalToU32(0)));
    }
    exponent = -(firstOne + 1);
    mantissaRaw = fracBits.slice(firstOne + 1);
  }

  const mantissaPeriod = fracPeriod ? detectPeriod(mantissaRaw) : null;
  function periodStr(bits, pd) {
    if (!pd) return bits || '0';
    const pre = bits.slice(0, pd.offset);
    return (pre || '') + '(' + pd.period + ')';
  }

  const step3 = `
<div class="step">
  <div class="step-badge">3</div>
  <div class="step-body">
    <div class="step-title">${S().tNorm}</div>
    ${S().normForm}
    <code>${binaryRepCompact()}</code> = <code>1.${periodStr(mantissaRaw, mantissaPeriod)} × 2<sup>${exponent}</sup></code>
    ${intPart > 0 ? `<br>${S().shiftL(exponent)}` : `<br>${S().shiftR(exponent)}`}
    ${mantissaPeriod ? S().mantPeriod(mantissaPeriod.period, mantissaPeriod.period.length) : ''}
  </div>
</div>`;

  // Step 4: Biased exponent
  const bias = 127;
  const biasedExp = exponent + bias;
  const { bits: expBits, html: expTableHtml } = intToBinTableHtml(biasedExp, 'Exponent');
  const expBits8 = expBits.padStart(8, '0');
  const step4 = `
<div class="step">
  <div class="step-badge">4</div>
  <div class="step-body">
    <div class="step-title">${S().tBias}</div>
    ${S().biasAdd(exponent)}
    <code>${exponent} + 127 = ${biasedExp}</code><br><br>
    ${S().biasConvert(biasedExp)}
    ${expTableHtml}
    <br>${S().biasResult} <code class="code-blue">${expBits8}</code>
  </div>
</div>`;

  // Step 5: Mantissa with rounding
  const raw23 = mantissaRaw.slice(0, 50);
  const { bits23, overflow, note: roundNote } = applyRounding(raw23, mode);
  if (overflow) {
    // exponent already correct in u32; no display change needed here
  }

  let step5 = `
<div class="step">
  <div class="step-badge">5</div>
  <div class="step-body">
    <div class="step-title">${S().tMant}</div>`;

  if (mantissaPeriod) {
    const ext26 = expandPeriod(mantissaRaw, mantissaPeriod, 26);
    const guardBit = ext26[23];
    step5 += S().m5RepForever(mantissaPeriod.period);
    step5 += S().m5Store23;
    step5 += `<code>${ext26.slice(0,23)} | ${ext26.slice(23)}</code><br>`;
    step5 += S().m5Marker;
    step5 += mode === 'truncate' ? S().m5Trunc : S().m5Round(guardBit);
    if (roundNote) step5 += `<div class="rounding-note">${roundNote}</div>`;
    step5 += `<br>${S().m5Final} <code class="code-green">${bits23}</code>`;
  } else if (raw23.length <= 23) {
    step5 += S().m5Short(raw23);
    step5 += `${S().m5Final} <code class="code-green">${bits23}</code>`;
  } else {
    step5 += S().m5Long(raw23.slice(0,26));
    step5 += `<code>${raw23.slice(0,23)} | ${raw23.slice(23)}</code><br>`;
    if (roundNote) step5 += `<div class="rounding-note">${roundNote}</div>`;
    step5 += `<br>${S().m5Final} <code class="code-green">${bits23}</code>`;
  }
  step5 += `</div></div>`;

  // Assemble from the already-computed u32 (respects truncate vs round)
  const verifyBits = u32ToBitString(u32);
  const verifySign = verifyBits[0];
  const verifyExp  = verifyBits.slice(1, 9);
  const verifyMan  = verifyBits.slice(9);

  // Step 6: Assemble
  const step6 = `
<div class="step">
  <div class="step-badge">6</div>
  <div class="step-body">
    <div class="step-title">${S().tAssemble}</div>
    <div class="assemble-block">
      <div class="assemble-row"><span class="assemble-lbl">${S().aSign}</span>     <span class="assemble-val"><span class="s-bit">${verifySign}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">${S().aExp}</span> <span class="assemble-val"><span class="e-bit">${verifyExp}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">${S().aMan}</span> <span class="assemble-val"><span class="m-bit">${verifyMan}</span></span></div>
      <div style="border-top:1px solid #2e2e34; margin: 6px 0;"></div>
      <div class="assemble-row"><span class="assemble-lbl">${S().aRes}</span>   <span class="assemble-val"><span class="s-bit">${verifySign}</span> <span class="e-bit">${verifyExp}</span> <span class="m-bit">${verifyMan}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">${S().aHex}</span>      <span class="assemble-hex">${u32ToHex(u32)}</span></div>
    </div>
  </div>
</div>`;

  return `<div class="steps-panel"><h2>${S().stepByStep}</h2>${step1}${step2}${step3}${step4}${step5}${step6}</div>`;
}

function buildSubnormalSteps(value, mode, u32) {
  const negative = value < 0;
  const absVal = Math.abs(value);
  const bits = u32ToBitString(u32);
  const verifySign = bits[0];
  const verifyExp  = bits.slice(1, 9);
  const verifyMan  = bits.slice(9);
  const signBit = negative ? 1 : 0;

  // Step 1: sign
  const signWord = negative ? S().neg : S().pos;
  const signCls  = negative ? 'code-red' : 'code-green';
  const step1 = `
<div class="step">
  <div class="step-badge">1</div>
  <div class="step-body">
    <div class="step-title">${S().tSign}</div>
    ${S().signIs(signWord, signBit, signCls)}
  </div>
</div>`;

  // Step 2: recognize subnormal
  const step2 = `
<div class="step">
  <div class="step-badge">2</div>
  <div class="step-body">
    <div class="step-title">${S().tSubRecog}</div>
    ${S().subSmaller(absVal.toExponential(6))}<br>
    ${S().subMinNorm}<br><br>
    ${S().subCantNorm}
    ${S().subUses}
    <ul style="margin:8px 0 0 20px; line-height:2.1;">
      ${S().subFields.map(f => `<li>${f}</li>`).join('')}
    </ul>
  </div>
</div>`;

  // Step 3: compute mantissa bits
  const mantFrac = absVal * Math.pow(2, 126);
  const { bits: fracBits, html: fracTableHtml, period: fracPd } = fracToBinTableHtml(mantFrac, 30);

  const step3 = `
<div class="step">
  <div class="step-badge">3</div>
  <div class="step-body">
    <div class="step-title">${S().tSubComp}</div>
    ${S().subMantFrom(absVal.toExponential(6), mantFrac.toPrecision(6))}
    ${fracTableHtml}
  </div>
</div>`;

  // Step 4: store 23 mantissa bits
  const raw23 = fracBits.slice(0, 50);
  const { bits23, overflow, note: roundNote } = applyRounding(raw23, mode);

  let step4 = `
<div class="step">
  <div class="step-badge">4</div>
  <div class="step-body">
    <div class="step-title">${S().tSubStore}</div>`;

  if (fracPd) {
    const ext26 = expandPeriod(fracBits, fracPd, 26);
    const guardBit = ext26[23];
    step4 += S().subRepPeriod(fracPd.period);
    step4 += `<code>${ext26.slice(0,23)} | ${ext26.slice(23)}</code><br>`;
    step4 += mode === 'truncate' ? S().subTrunc : S().subRound(guardBit);
    if (roundNote) step4 += `<div class="rounding-note">${roundNote}</div>`;
    step4 += `<br>${S().subFinal} <code class="code-green">${bits23}</code>`;
  } else if (raw23.length <= 23) {
    step4 += S().subShort(raw23);
    step4 += `${S().subFinal} <code class="code-green">${bits23}</code>`;
  } else {
    step4 += S().subLong(raw23.slice(0,26));
    step4 += `<code>${raw23.slice(0,23)} | ${raw23.slice(23)}</code><br>`;
    if (mode === 'round') step4 += S().subRoundHdr;
    if (roundNote) step4 += `<div class="rounding-note">${roundNote}</div>`;
    step4 += `<br>${S().subFinal} <code class="code-green">${bits23}</code>`;
  }
  step4 += `</div></div>`;

  // Step 5: assemble
  const step5 = `
<div class="step">
  <div class="step-badge">5</div>
  <div class="step-body">
    <div class="step-title">${S().tAssemble}</div>
    <div class="assemble-block">
      <div class="assemble-row"><span class="assemble-lbl">${S().aSign}</span>     <span class="assemble-val"><span class="s-bit">${verifySign}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">${S().aExp}</span> <span class="assemble-val"><span class="e-bit">${verifyExp}</span> <span style="color:#666670; font-size:0.8rem;">${S().subExpNote}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">${S().aMan}</span> <span class="assemble-val"><span class="m-bit">${verifyMan}</span></span></div>
      <div style="border-top:1px solid #2e2e34; margin:6px 0;"></div>
      <div class="assemble-row"><span class="assemble-lbl">${S().aRes}</span>   <span class="assemble-val"><span class="s-bit">${verifySign}</span> <span class="e-bit">${verifyExp}</span> <span class="m-bit">${verifyMan}</span></span></div>
      <div class="assemble-row"><span class="assemble-lbl">${S().aHex}</span>      <span class="assemble-hex">${u32ToHex(u32)}</span></div>
    </div>
  </div>
</div>`;

  return `<div class="steps-panel"><h2>${S().stepByStep} <span class="special-badge">${S().subBadge}</span></h2>${step1}${step2}${step3}${step4}${step5}</div>`;
}

function buildSpecialSteps(label, bits) {
  const sign = bits[0];
  const exp  = bits.slice(1, 9);
  const man  = bits.slice(9);
  let description = '';
  if (label === 'NaN') {
    description = S().nanDesc;
  } else if (label === '+Infinity' || label === '-Infinity') {
    description = S().infDesc;
  } else if (label === '+0' || label === '-0') {
    description = S().zeroDesc;
  }
  return `<div class="decode-panel">
    <h2>${S().specialTitle} <span class="special-badge">${label}</span></h2>
    <div class="decode-row">
      <span class="decode-lbl">${S().specialPat}</span>
      <span class="decode-val">
        <span style="color:#fca5a5;">${sign}</span>
        <span style="color:#bfdbfe;"> ${exp}</span>
        <span style="color:#86efac;"> ${man}</span>
      </span>
    </div>
    <div class="decode-row">
      <span class="decode-lbl">${S().specialExpl}</span>
      <span class="decode-val">${description}</span>
    </div>
  </div>`;
}

// ── Decode mode ──────────────────────────────────────────────────────────────
function decodeHex() {
  let raw = document.getElementById('hexInput').value.trim();
  if (!raw) return;

  let u32;
  // 32-char binary string?
  if (/^[01]{32}$/.test(raw)) {
    u32 = bitStringToU32(raw);
  } else {
    // Hex (strip 0x prefix)
    raw = raw.replace(/^0x/i, '').replace(/\s/g, '');
    if (!/^[0-9a-fA-F]{1,8}$/.test(raw)) {
      alert('Enter 8 hex digits (e.g. C0870000) or a 32-bit binary string.');
      return;
    }
    u32 = hexToU32(raw.padStart(8, '0'));
  }

  lastMode = 'decode';
  setBitsFromU32(u32);
  updateBitRow();
  updateSummary(u32);
  document.getElementById('decInput').value = '';
  document.getElementById('hexInput').value = u32ToBitString(u32);

  showSteps(buildDecodePanel(u32));
}

function buildDecodePanel(u32) {
  const bits = u32ToBitString(u32);
  const signBit = parseInt(bits[0]);
  const expBits = bits.slice(1, 9);
  const manBits = bits.slice(9);

  const expVal = parseInt(expBits, 2);
  const manVal = parseInt(manBits, 2);
  const value  = u32ToDecimal(u32);

  // Special cases
  const isSpecialExp = expVal === 255;
  const isZeroExp    = expVal === 0;
  const isNaNVal     = isSpecialExp && manVal !== 0;
  const isInfVal     = isSpecialExp && manVal === 0;
  const isZeroVal    = isZeroExp && manVal === 0;
  const isSubnormal  = isZeroExp && manVal !== 0;

  let specialNote = '';
  let result = '';

  if (isNaNVal) {
    specialNote = '<span class="special-badge">NaN</span>';
    result = S().dNaN;
  } else if (isInfVal) {
    specialNote = `<span class="special-badge">${signBit ? '−' : '+'}Infinity</span>`;
    result = S().dInf;
  } else if (isZeroVal) {
    specialNote = `<span class="special-badge">${signBit ? '−0' : '+0'}</span>`;
    result = S().dZero;
  } else if (isSubnormal) {
    specialNote = `<span class="special-badge">${S().subBadge}</span>`;
    result = S().dSubResult(value);
  } else {
    const actualExp = expVal - 127;
    const mantFrac = parseInt(manBits, 2) / Math.pow(2, 23);
    const significand = 1 + mantFrac;
    result = `${signBit ? '−' : '+'}${significand.toPrecision(8)} × 2<sup>${actualExp}</sup> = <strong>${value}</strong>`;
  }

  let html = `<div class="decode-panel"><h2>${S().decodeTitle} ${specialNote}</h2>`;

  html += `<div class="decode-row">
    <span class="decode-lbl">${S().dBits}</span>
    <span class="decode-val">
      <span style="color:#fca5a5;">${bits[0]}</span>
      <span style="color:#bfdbfe;"> ${expBits}</span>
      <span style="color:#86efac;"> ${manBits}</span>
    </span>
  </div>`;

  html += `<div class="decode-row">
    <span class="decode-lbl">${S().dSign}</span>
    <span class="decode-val"><code>${signBit}</code> → ${signBit ? S().dNeg : S().dPos}</span>
  </div>`;

  html += `<div class="decode-row">
    <span class="decode-lbl">${S().dExp}</span>
    <span class="decode-val"><code>${expBits}</code> = ${expVal}${isSpecialExp ? ` ${S().dAllOnes}` : isZeroExp ? ` ${S().dAllZeros}` : ` → ${expVal} − 127 = <strong>${expVal - 127}</strong>`}</span>
  </div>`;

  html += `<div class="decode-row">
    <span class="decode-lbl">${S().dMan}</span>
    <span class="decode-val"><code>${manBits}</code>${isSpecialExp || isZeroVal ? '' : ` → ${isSubnormal ? '0' : '1'}.${manBits} (${S().dBinFrac})`}</span>
  </div>`;

  if (!isNaNVal && !isInfVal && !isZeroVal) {
    if (isSubnormal) {
      html += `<div class="decode-row">
        <span class="decode-lbl">${S().dForm}</span>
        <span class="decode-val">0.${manBits} × 2<sup>−126</sup> ${S().dSubForm}</span>
      </div>`;
    } else {
      const actualExp = expVal - 127;
      html += `<div class="decode-row">
        <span class="decode-lbl">${S().dForm}</span>
        <span class="decode-val">${signBit ? '−' : '+'}1.${manBits} × 2<sup>${actualExp}</sup></span>
      </div>`;
    }
  }

  html += `<div class="decode-row">
    <span class="decode-lbl">${S().dResult}</span>
    <span class="decode-val">${result}</span>
  </div>`;

  html += '</div>';
  return html;
}

// ── Event wiring ─────────────────────────────────────────────────────────────
document.getElementById('convertBtn').addEventListener('click', convertDecimal);
document.getElementById('decodeBtn').addEventListener('click', decodeHex);

document.getElementById('decInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') convertDecimal();
});
document.getElementById('hexInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') decodeHex();
});

document.getElementById('roundMode').addEventListener('change', () => {
  if (lastMode === 'decimal' && lastDecimalValue !== null) {
    const mode = document.getElementById('roundMode').value;
    const u32 = decimalToU32WithMode(lastDecimalValue, mode);
    setBitsFromU32(u32);
    updateBitRow();
    updateSummary(u32, lastDecimalValue);
    document.getElementById('hexInput').value = u32ToBitString(u32);
    showSteps(buildSteps(lastDecimalValue, mode));
  }
});

// ── Initial render ───────────────────────────────────────────────────────────
buildBitRow();
// Init language, then default conversion
setLang(lang);
convertDecimal();
</script>

</body>
