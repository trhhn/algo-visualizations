<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dijkstra's Algorithm — Build & Run</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e22;
    color: #cccccc;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: #eeeeee;
  }

  .subtitle {
    text-align: center;
    color: #666670;
    margin-bottom: 20px;
    font-size: 0.88rem;
  }

  .tabs {
    display: flex;
    gap: 10px;
  }

  .tab {
    padding: 10px 24px;
    border: 2px solid #505055;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    background: #383840;
    color: #aaaaaa;
  }

  .tab:hover { border-color: #22c55e; }
  .tab.active { border-color: #22c55e; background: rgba(34,197,94,0.1); color: #22c55e; }

  .stage {
    background: #252528;
    border-radius: 12px;
    padding: 24px;
    max-width: 980px;
    margin: 0 auto;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .toolbar-sep {
    width: 1px;
    height: 24px;
    background: #505055;
    margin: 0 4px;
  }

  .tool-btn {
    padding: 8px 16px;
    border: 2px solid #505055;
    border-radius: 8px;
    background: #383840;
    color: #aaaaaa;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }

  .tool-btn:hover { border-color: #22c55e; }

  .tool-btn.active {
    border-color: #22c55e;
    background: rgba(34,197,94,0.1);
    color: #22c55e;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary   { background: #22c55e; color: #0a1a10; }
  .btn-secondary { background: #383840; color: #cccccc; }
  .btn-danger    { background: #b83030; color: #fff; }
  .btn-play      { background: #226633; color: #88eea8; min-width: 110px; }

  .btn-primary:hover:not(:disabled)   { background: #1ea84f; }
  .btn-secondary:hover:not(:disabled) { background: #48484f; }
  .btn-danger:hover:not(:disabled)    { background: #a02020; }
  .btn-play:hover:not(:disabled)      { background: #1a5028; }

  select {
    background: #383840;
    color: #cccccc;
    border: 2px solid #505055;
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 0.88rem;
  }

  .hint {
    color: #666670;
    font-size: 0.85rem;
    margin-bottom: 14px;
    min-height: 1.2em;
  }

  #graphSvg {
    width: 100%;
    height: auto;
    background: #13131a;
    border-radius: 10px;
    border: 1px solid #2a2a38;
    touch-action: none;
    display: block;
    margin-bottom: 16px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
    font-size: 0.8rem;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid;
    background: #252528;
  }

  .legend-line {
    width: 22px;
    height: 0;
    border-top: 3px solid;
  }

  .explanation {
    background: #2a2a32;
    border-radius: 8px;
    padding: 14px 18px;
    min-height: 56px;
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 16px;
    border-left: 3px solid #22c55e;
    color: #cccccc;
  }

  .progress-wrap {
    background: #2a2a32;
    border-radius: 8px;
    height: 6px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: #22c55e;
    border-radius: 8px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .step-info {
    text-align: center;
    color: #666670;
    font-size: 0.82rem;
    margin-bottom: 16px;
  }

  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: #888890;
  }

  input[type=range] { accent-color: #22c55e; width: 90px; }

  .run-columns {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 16px;
  }

  @media (max-width: 760px) {
    .run-columns { grid-template-columns: 1fr; }
  }

  .pseudo-title {
    font-size: 0.72rem;
    color: #666670;
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .pseudocode {
    background: #13131a;
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #b0c4de;
    border: 1px solid #2a2a38;
    white-space: pre;
    overflow-x: auto;
  }

  .pseudocode .line {
    padding: 1px 6px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .pseudocode .line.active-line {
    background: rgba(34, 197, 94, 0.15);
    color: #22c55e;
    font-weight: 600;
  }

  .pseudocode .kw  { color: #c792ea; }
  .pseudocode .fn  { color: #82aaff; }
  .pseudocode .num { color: #f78c6c; }

  .state-table {
    width: 100%;
    border-collapse: collapse;
    background: #13131a;
    border-radius: 8px;
    overflow: hidden;
    font-size: 0.85rem;
    border: 1px solid #2a2a38;
  }

  .state-table th, .state-table td {
    padding: 7px 10px;
    text-align: center;
    border-bottom: 1px solid #2a2a38;
  }

  .state-table th {
    background: #1e1e2e;
    color: #22c55e;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tabs-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; margin-bottom:20px; max-width:980px; margin-left:auto; margin-right:auto; }
  .tabs-row-right { display:flex; justify-content:flex-end; align-items:center; gap:6px; }
  .lang-label { font-size:0.82rem; color:#888888; }
  #langSelect { background:#383840; color:#cccccc; border:2px solid #505055; border-radius:8px; padding:4px 8px; font-size:0.82rem; cursor:pointer; }
  a.back-link { display:inline-block; font-size:0.82rem; font-weight:600; color:#888890; text-decoration:none; margin-bottom:16px; padding:6px 12px; background:#252528; border:1px solid #383840; border-radius:8px; transition:color 0.15s,border-color 0.15s; }
  a.back-link:hover { color:#22c55e; border-color:#22c55e; }
  .ver { text-align: center; color: #383840; font-size: 0.72rem; padding-top: 32px; }
  /* iOS Safari zooms on focus when font-size < 16px */
  input, select { font-size: 16px !important; }
</style>
</head>
<body>

<h1 id="pageTitle">Dijkstra's Algorithm</h1>
<p class="subtitle" id="pageSubtitle">Draw a graph, then step through how the code finds shortest paths</p>

<div class="tabs-row">
  <div><a class="back-link" href="index.html">← Tools</a></div>
  <div class="tabs">
    <button class="tab active" id="tabBuild" onclick="switchMode('build')">Build Graph</button>
    <button class="tab" id="tabRun" onclick="switchMode('run')">Run Algorithm</button>
  </div>
  <div class="tabs-row-right">
    <label class="lang-label">Language:</label>
    <select id="langSelect" onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="de">DE</option>
    </select>
  </div>
</div>

<div class="stage">

  <div class="toolbar" id="buildToolbar">
    <button class="tool-btn active" data-tool="move" id="toolMove" onclick="setTool('move')">Move / Edit</button>
    <button class="tool-btn" data-tool="addNode" id="toolAddNode" onclick="setTool('addNode')">Add Node</button>
    <button class="tool-btn" data-tool="addEdge" id="toolAddEdge" onclick="setTool('addEdge')">Add Edge</button>
    <button class="tool-btn" data-tool="delete" id="toolDelete" onclick="setTool('delete')">Delete</button>
    <span class="toolbar-sep"></span>
    <button class="btn btn-secondary" id="btnLoadExample" onclick="loadExample()">Load Example</button>
    <button class="btn btn-danger" id="btnClear" onclick="clearGraph()">Clear</button>
  </div>
  <div class="hint" id="buildHint">Drag a node to move it. Click (without dragging) a node or edge to rename/reweight it.</div>

  <div class="toolbar" id="runToolbar" style="display:none">
    <label style="font-size:0.88rem;color:#ccc"><span id="sourceLabel">Source:</span>
      <select id="sourceSelect"></select>
    </label>
    <button class="btn btn-primary" id="btnStart" onclick="startRun()">Start</button>
    <span class="toolbar-sep"></span>
    <button class="btn btn-secondary" onclick="stepBack()" id="btnBack" disabled>◀ Back</button>
    <button class="btn btn-primary" onclick="stepForward()" id="btnNext" disabled>Next Step ▶</button>
    <button class="btn btn-play" onclick="togglePlay()" id="btnPlay" disabled>▶ Auto Play</button>
    <div class="speed-wrap">
      <span id="speedText">Speed</span>
      <input type="range" id="speedSlider" min="1" max="5" value="3">
      <span id="speedLabel">3×</span>
    </div>
  </div>

  <svg id="graphSvg" viewBox="0 0 800 460">
    <defs>
      <marker id="arrow-default" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L8,3 L0,6 z" fill="#5a6a8a"/>
      </marker>
      <marker id="arrow-current" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L8,3 L0,6 z" fill="#f0a030"/>
      </marker>
      <marker id="arrow-tree" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L8,3 L0,6 z" fill="#6bcb77"/>
      </marker>
    </defs>
    <g id="edgesLayer"></g>
    <g id="nodesLayer"></g>
  </svg>

  <div id="runLegend" class="legend" style="display:none"></div>

  <div id="runInfo" style="display:none">
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="explanation" id="explanation"></div>
    <div class="step-info" id="stepInfo"></div>

    <div class="run-columns">
      <div>
        <div class="pseudo-title" id="pseudoTitle">Java Code — dijkstra()</div>
        <div class="pseudocode" id="pseudocode"></div>
      </div>
      <div>
        <div class="pseudo-title">dist[] / prev[] / Q</div>
        <table class="state-table" id="stateTable"></table>
      </div>
    </div>
  </div>

</div>

<script>
const NODE_R = 26;

let nodes = [];   // {id, name, x, y}
let edges = [];   // {id, from, to, weight}
let nextNodeNum = 0;
let nextEdgeId = 0;

let mode = 'build';   // 'build' | 'run'
let tool = 'move';    // 'move' | 'addNode' | 'addEdge' | 'delete'
let pendingEdgeSource = null;

let steps = [];
let stepIndex = 0;
let playTimer = null;

// ─────────────────────────────────────────────
//  Language strings
// ─────────────────────────────────────────────
let lang = 'en';

const STRINGS = {

    mScanCmp:      (c, dc, u, du, better) => `Check ${c} (dist=${dc}) against current best ${u} (dist=${du})` + (better ? ` — smaller! Update u.` : ` — not smaller, keep u.`),

    mNoImprove:    (alt, v, dv) => `${alt} ist nicht kleiner als dist[${v}] (${dv}) — keine Aktualisierung.`,

};

function S() { return STRINGS[lang]; }

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.getElementById('langSelect').value = l;
  applyStaticLang();
  // rebuild steps if already running
  if (mode === 'run' && steps.length) {
    const sourceId = document.getElementById('sourceSelect').value;
    if (sourceId) {
      steps = buildDijkstraSteps(sourceId);
      renderRunStep();
    }
  }
  if (mode === 'build') {
    setHint(S().hints[tool] || S().hints.move);
  }
  if (mode === 'run') renderRunLegend();
}

function applyStaticLang() {
  const s = S();
  document.getElementById('pageTitle').textContent    = s.title;
  document.getElementById('pageSubtitle').textContent = s.subtitle;
  document.getElementById('tabBuild').textContent     = s.buildTab;
  document.getElementById('tabRun').textContent       = s.runTab;
  document.getElementById('toolMove').textContent     = s.toolMove;
  document.getElementById('toolAddNode').textContent  = s.toolAdd;
  document.getElementById('toolAddEdge').textContent  = s.toolEdge;
  document.getElementById('toolDelete').textContent   = s.toolDel;
  document.getElementById('btnLoadExample').textContent = s.loadEx;
  document.getElementById('btnClear').textContent     = s.clear;
  document.getElementById('sourceLabel').textContent  = s.source;
  document.getElementById('btnStart').textContent     = s.start;
  document.getElementById('btnBack').innerHTML        = s.back;
  document.getElementById('btnNext').innerHTML        = s.next;
  document.getElementById('speedText').textContent    = s.speed;
  document.getElementById('pseudoTitle').textContent  = s.pseudoTitle;
  if (!playTimer) document.getElementById('btnPlay').innerHTML = s.autoPlay;
}

// ─────────────────────────────────────────────
//  Data helpers
// ─────────────────────────────────────────────
function nodeById(id) { return nodes.find(n => n.id === id); }
function nameOf(id) { const n = nodeById(id); return n ? n.name : id; }
function edgeBetween(a, b) { return edges.find(e => e.from === a && e.to === b); }

function nextNodeName() {
  for (let i = 0; i < 26; i++) {
    const letter = String.fromCharCode(65 + i);
    if (!nodes.some(n => n.name === letter)) return letter;
  }
  return 'N' + nodes.length;
}

function fmtNum(v) {
  if (v === undefined || v === null) return '—';
  if (v === Infinity) return '∞';
  return Number.isInteger(v) ? String(v) : String(Math.round(v * 100) / 100);
}

function svgPoint(evt) {
  const svg = document.getElementById('graphSvg');
  const rect = svg.getBoundingClientRect();
  const scaleX = 800 / rect.width;
  const scaleY = 460 / rect.height;
  return {
    x: (evt.clientX - rect.left) * scaleX,
    y: (evt.clientY - rect.top) * scaleY
  };
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

// ─────────────────────────────────────────────
//  Render graph
// ─────────────────────────────────────────────
function renderGraph() {
  const edgesLayer = document.getElementById('edgesLayer');
  const nodesLayer = document.getElementById('nodesLayer');
  edgesLayer.innerHTML = '';
  nodesLayer.innerHTML = '';

  const step = (mode === 'run' && steps.length) ? steps[stepIndex] : null;

  edges.forEach(e => {
    const from = nodeById(e.from), to = nodeById(e.to);
    if (!from || !to) return;

    const reverse = edgeBetween(e.to, e.from);
    const curved = !!reverse;

    const dx = to.x - from.x, dy = to.y - from.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const ux = dx / dist, uy = dy / dist;
    const r = NODE_R + 2;
    const x1 = from.x + ux * r, y1 = from.y + uy * r;
    const x2 = to.x - ux * (r + 8), y2 = to.y - uy * (r + 8);

    let pathD, midX, midY;
    if (curved) {
      const canonStart = e.from < e.to ? from : to;
      const canonEnd = e.from < e.to ? to : from;
      const cdx = canonEnd.x - canonStart.x, cdy = canonEnd.y - canonStart.y;
      const cdist = Math.sqrt(cdx * cdx + cdy * cdy) || 1;
      const px = -(cdy / cdist), py = cdx / cdist;
      const offset = 22;
      const sign = e.from < e.to ? 1 : -1;
      const cx = (x1 + x2) / 2 + px * offset * sign;
      const cy = (y1 + y2) / 2 + py * offset * sign;
      pathD = `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
      midX = cx; midY = cy;
    } else {
      pathD = `M ${x1} ${y1} L ${x2} ${y2}`;
      midX = (x1 + x2) / 2; midY = (y1 + y2) / 2;
    }

    let strokeColor = '#5a6a8a', strokeWidth = 2, marker = 'url(#arrow-default)';
    const isCurrentEdge = step && step.currentEdge && step.currentEdge.from === e.from && step.currentEdge.to === e.to;
    const isTreeEdge = step && step.prev && step.prev[e.to] === e.from;
    if (isCurrentEdge) { strokeColor = '#f0a030'; strokeWidth = 4; marker = 'url(#arrow-current)'; }
    else if (isTreeEdge) { strokeColor = '#6bcb77'; strokeWidth = 3.5; marker = 'url(#arrow-tree)'; }

    const path = svgEl('path', { d: pathD, fill: 'none', stroke: strokeColor, 'stroke-width': strokeWidth, 'marker-end': marker });
    const bg = svgEl('circle', { cx: midX, cy: midY, r: 12, fill: '#252528', stroke: strokeColor, 'stroke-width': 1.5 });
    const text = svgEl('text', { x: midX, y: midY + 4, 'text-anchor': 'middle', 'font-size': 12, fill: '#dde' });
    text.textContent = e.weight;

    [path, bg, text].forEach(el => {
      el.style.cursor = mode === 'build' ? 'pointer' : 'default';
      if (mode === 'build') el.addEventListener('click', (ev) => onEdgeClick(ev, e.id));
    });

    edgesLayer.appendChild(path);
    edgesLayer.appendChild(bg);
    edgesLayer.appendChild(text);
  });

  nodes.forEach(n => {
    const g = svgEl('g', {});
    g.dataset.nodeId = n.id;
    g.style.cursor = mode === 'build' ? (tool === 'move' ? 'grab' : 'pointer') : 'default';

    let fill = '#2a3a6a', stroke = '#5a6a8a', strokeWidth = 2, strokeDasharray = null;

    if (step) {
      const isFinalized = step.finalized.includes(n.id);
      const isCurrent = step.currentU === n.id;
      const isScanCandidate = step.scanCandidate === n.id;
      const isScanBest = step.scanBest === n.id;

      if (isFinalized) { fill = '#2f6b3a'; stroke = '#6bcb77'; }
      if (isCurrent) { stroke = '#a78bfa'; strokeWidth = 4; }
      if (isScanCandidate) { stroke = '#f0c040'; strokeWidth = 4; }
      if (isScanBest) { strokeDasharray = '4 3'; stroke = '#4ecdc4'; strokeWidth = 3; }
    } else if (mode === 'build' && tool === 'addEdge' && pendingEdgeSource === n.id) {
      stroke = '#f0c040'; strokeWidth = 4;
    }

    const circleAttrs = { cx: n.x, cy: n.y, r: NODE_R, fill, stroke, 'stroke-width': strokeWidth };
    if (strokeDasharray) circleAttrs['stroke-dasharray'] = strokeDasharray;
    g.appendChild(svgEl('circle', circleAttrs));

    const label = svgEl('text', { x: n.x, y: n.y + 5, 'text-anchor': 'middle', 'font-size': 15, 'font-weight': 700, fill: '#fff' });
    label.textContent = n.name;
    g.appendChild(label);

    if (step) {
      const distVal = step.dist[n.id];
      const distLabel = svgEl('text', { x: n.x, y: n.y + NODE_R + 16, 'text-anchor': 'middle', 'font-size': 12, fill: '#aab' });
      distLabel.textContent = S().distLabel(distVal === Infinity ? '∞' : fmtNum(distVal));
      g.appendChild(distLabel);
    }

    if (mode === 'build') {
      g.addEventListener('pointerdown', (ev) => onNodePointerDown(ev, n.id));
    }

    nodesLayer.appendChild(g);
  });
}

// ─────────────────────────────────────────────
//  Build-mode interaction
// ─────────────────────────────────────────────
let drag = null;

function onNodePointerDown(ev, id) {
  ev.stopPropagation();
  if (tool === 'delete') {
    deleteNode(id);
    return;
  }
  if (tool === 'addEdge') {
    if (pendingEdgeSource === null) {
      pendingEdgeSource = id;
      setHint(S().selectedSrc(nameOf(id)));
      renderGraph();
    } else {
      const sourceId = pendingEdgeSource;
      pendingEdgeSource = null;
      if (sourceId !== id) {
        addOrUpdateEdge(sourceId, id);
      }
      setHint(S().newEdgeHint);
      renderGraph();
    }
    return;
  }
  if (tool === 'move') {
    const p = svgPoint(ev);
    drag = { id, startX: p.x, startY: p.y, moved: false };
    window.addEventListener('pointermove', onDragMove);
    window.addEventListener('pointerup', onDragUp);
  }
}

function onDragMove(ev) {
  if (!drag) return;
  const p = svgPoint(ev);
  const dx = p.x - drag.startX, dy = p.y - drag.startY;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) drag.moved = true;
  const n = nodeById(drag.id);
  n.x = Math.max(NODE_R, Math.min(800 - NODE_R, p.x));
  n.y = Math.max(NODE_R, Math.min(460 - NODE_R, p.y));
  renderGraph();
}

function onDragUp(ev) {
  window.removeEventListener('pointermove', onDragMove);
  window.removeEventListener('pointerup', onDragUp);
  if (drag && !drag.moved) {
    renameNode(drag.id);
  }
  drag = null;
}

function onSvgClick(ev) {
  if (mode !== 'build' || tool !== 'addNode') return;
  if (ev.target.closest('g[data-node-id]') || ev.target.tagName === 'circle' || ev.target.tagName === 'text') return;
  const p = svgPoint(ev);
  addNodeAt(p.x, p.y);
}

function onEdgeClick(ev, edgeId) {
  ev.stopPropagation();
  if (tool === 'delete') {
    edges = edges.filter(e => e.id !== edgeId);
    rebuildAfterGraphChange();
    return;
  }
  if (tool === 'move' || tool === 'addEdge') {
    const e = edges.find(x => x.id === edgeId);
    if (!e) return;
    const input = prompt(S().edgeWeight(nameOf(e.from), nameOf(e.to)), e.weight);
    if (input === null) return;
    const w = parseFloat(input);
    if (!isNaN(w) && w > 0) {
      e.weight = w;
      rebuildAfterGraphChange();
    }
  }
}

function addNodeAt(x, y) {
  const name = nextNodeName();
  nodes.push({ id: 'n' + (nextNodeNum++), name, x, y });
  rebuildAfterGraphChange();
}

function renameNode(id) {
  const n = nodeById(id);
  if (!n) return;
  const input = prompt(S().nodeName, n.name);
  if (input === null) return;
  const trimmed = input.trim();
  if (trimmed === '') return;
  if (nodes.some(other => other.id !== id && other.name === trimmed)) {
    alert(S().dupNode);
    return;
  }
  n.name = trimmed;
  rebuildAfterGraphChange();
}

function deleteNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  edges = edges.filter(e => e.from !== id && e.to !== id);
  if (pendingEdgeSource === id) pendingEdgeSource = null;
  rebuildAfterGraphChange();
}

function addOrUpdateEdge(fromId, toId) {
  const existing = edges.find(e => e.from === fromId && e.to === toId);
  const defaultWeight = existing ? existing.weight : 1;
  const input = prompt(S().edgeWeight(nameOf(fromId), nameOf(toId)), defaultWeight);
  if (input === null) return;
  const w = parseFloat(input);
  if (isNaN(w) || w <= 0) {
    alert(S().posNum);
    return;
  }
  if (existing) {
    existing.weight = w;
  } else {
    edges.push({ id: 'e' + (nextEdgeId++), from: fromId, to: toId, weight: w });
  }
  rebuildAfterGraphChange();
}

function rebuildAfterGraphChange() {
  if (mode === 'run') {
    refreshSourceSelect();
  }
  renderGraph();
}

// ─────────────────────────────────────────────
//  Mode / tool switching, hints, example graph
// ─────────────────────────────────────────────
function setHint(text) {
  document.getElementById('buildHint').textContent = text;
}

function setTool(t) {
  tool = t;
  pendingEdgeSource = null;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  setHint(S().hints[t] || S().hints.move);
  renderGraph();
}

function switchMode(m) {
  mode = m;
  document.getElementById('tabBuild').classList.toggle('active', m === 'build');
  document.getElementById('tabRun').classList.toggle('active', m === 'run');
  document.getElementById('buildToolbar').style.display = m === 'build' ? 'flex' : 'none';
  document.getElementById('buildHint').style.display = m === 'build' ? 'block' : 'none';
  document.getElementById('runToolbar').style.display = m === 'run' ? 'flex' : 'none';
  document.getElementById('runLegend').style.display = m === 'run' ? 'flex' : 'none';
  document.getElementById('runInfo').style.display = (m === 'run' && steps.length) ? 'block' : 'none';

  if (m === 'run') {
    refreshSourceSelect();
    renderRunLegend();
  } else {
    stopPlay();
  }

  if (m === 'run' && steps.length) {
    renderRunStep();
  } else {
    renderGraph();
  }
}

function refreshSourceSelect() {
  const sel = document.getElementById('sourceSelect');
  const prev = sel.value;
  sel.innerHTML = '';
  nodes.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n.id;
    opt.textContent = n.name;
    sel.appendChild(opt);
  });
  if (nodes.some(n => n.id === prev)) sel.value = prev;

  const hasNodes = nodes.length > 0;
  document.getElementById('sourceSelect').disabled = !hasNodes;
  document.querySelector('#runToolbar .btn-primary').disabled = !hasNodes;
}

function loadExample() {
  nodes = [];
  edges = [];
  nextNodeNum = 0;
  nextEdgeId = 0;

  const layout = [
    ['A', 110, 230], ['B', 280, 100], ['C', 280, 360],
    ['D', 470, 360], ['E', 650, 230], ['F', 470, 100]
  ];
  const idOf = {};
  layout.forEach(([name, x, y]) => {
    const id = 'n' + (nextNodeNum++);
    idOf[name] = id;
    nodes.push({ id, name, x, y });
  });

  const addUndirected = (a, b, w) => {
    edges.push({ id: 'e' + (nextEdgeId++), from: idOf[a], to: idOf[b], weight: w });
    edges.push({ id: 'e' + (nextEdgeId++), from: idOf[b], to: idOf[a], weight: w });
  };
  addUndirected('A', 'B', 7);
  addUndirected('A', 'C', 9);
  addUndirected('A', 'F', 14);
  addUndirected('B', 'C', 10);
  addUndirected('B', 'D', 15);
  addUndirected('C', 'D', 11);
  addUndirected('C', 'F', 2);
  addUndirected('D', 'E', 6);
  addUndirected('E', 'F', 9);

  pendingEdgeSource = null;
  steps = [];
  stepIndex = 0;
  document.getElementById('runInfo').style.display = 'none';
  rebuildAfterGraphChange();
  setHint(S().exampleLoaded);
}

function clearGraph() {
  if (nodes.length && !confirm(S().confirmClear)) return;
  nodes = [];
  edges = [];
  nextNodeNum = 0;
  nextEdgeId = 0;
  pendingEdgeSource = null;
  steps = [];
  stepIndex = 0;
  document.getElementById('runInfo').style.display = 'none';
  rebuildAfterGraphChange();
  setHint(S().hints[tool] || S().hints.move);
}

// ─────────────────────────────────────────────
//  Step generator
// ─────────────────────────────────────────────
function neighborsOf(u) {
  return edges.filter(e => e.from === u);
}

function buildDijkstraSteps(sourceId) {
  const steps = [];
  const dist = {};
  const prev = {};
  let Q = [];
  const finalized = [];
  const s = S();

  const snapshot = (extra) => Object.assign({
    dist: { ...dist },
    prev: { ...prev },
    Q: [...Q],
    finalized: [...finalized],
    currentU: null,
    scanCandidate: null,
    scanBest: null,
    currentEdge: null,
    message: ''
  }, extra);

  steps.push(snapshot({ codeLine: 'declare', message: s.mInit }));

  nodes.forEach(n => {
    dist[n.id] = Infinity;
    prev[n.id] = null;
    Q.push(n.id);
    steps.push(snapshot({ codeLine: 'initBody', message: s.mInitVertex(n.name) }));
  });

  dist[sourceId] = 0;
  steps.push(snapshot({ codeLine: 'setSourceDist', message: s.mSource(nameOf(sourceId)) }));

  while (Q.length > 0) {
    steps.push(snapshot({ codeLine: 'whileCheck', message: s.mQNotEmpty(Q.length) }));

    let u = Q[0];
    steps.push(snapshot({ codeLine: 'pickU', scanBest: u, message: s.mPickU(nameOf(u)) }));

    for (const candidate of Q) {
      const isBetter = dist[candidate] < dist[u];
      steps.push(snapshot({
        codeLine: 'scanCompare',
        scanCandidate: candidate,
        scanBest: u,
        message: s.mScanCmp(nameOf(candidate), fmtNum(dist[candidate]), nameOf(u), fmtNum(dist[u]), isBetter)
      }));
      if (isBetter) {
        u = candidate;
        steps.push(snapshot({ codeLine: 'updateU', scanCandidate: candidate, scanBest: u, message: s.mUpdateU(nameOf(u)) }));
      }
    }

    Q = Q.filter(id => id !== u);
    finalized.push(u);
    steps.push(snapshot({ codeLine: 'removeU', currentU: u, message: s.mRemoveU(nameOf(u), fmtNum(dist[u])) }));

    const ns = neighborsOf(u);
    if (ns.length === 0) {
      steps.push(snapshot({ codeLine: 'neighborLoop', currentU: u, message: s.mNoEdges(nameOf(u)) }));
    }
    for (const e of ns) {
      const v = e.to;
      steps.push(snapshot({ codeLine: 'neighborLoop', currentU: u, currentEdge: { from: u, to: v }, message: s.mEdge(nameOf(u), nameOf(v), e.weight) }));

      const alt = dist[u] + e.weight;
      steps.push(snapshot({ codeLine: 'computeAlt', currentU: u, currentEdge: { from: u, to: v }, message: s.mAlt(nameOf(u), nameOf(v), fmtNum(dist[u]), e.weight, fmtNum(alt)) }));

      const improves = alt < dist[v];
      steps.push(snapshot({
        codeLine: 'altCompare',
        currentU: u,
        currentEdge: { from: u, to: v },
        message: improves ? s.mImproves(fmtNum(alt), nameOf(v), fmtNum(dist[v])) : s.mNoImprove(fmtNum(alt), nameOf(v), fmtNum(dist[v]))
      }));

      if (improves) {
        dist[v] = alt;
        prev[v] = u;
        steps.push(snapshot({ codeLine: 'updateDistPrev', currentU: u, currentEdge: { from: u, to: v }, message: s.mUpdate(nameOf(v), fmtNum(alt), nameOf(u)) }));
      }
    }
  }

  steps.push(snapshot({ codeLine: 'returnResult', message: s.mDone }));
  return steps;
}

function renderPseudocode(activeId) {
  const container = document.getElementById('pseudocode');
  container.innerHTML = '';
  PSEUDO_DIJKSTRA.forEach(line => {
    const div = document.createElement('div');
    div.className = 'line' + (line.id === activeId ? ' active-line' : '');
    div.innerHTML = line.html;
    container.appendChild(div);
  });
}

function renderStateTable(step) {
  const s = S();
  const table = document.getElementById('stateTable');
  let html = `<tr><th>${s.thVertex}</th><th>dist</th><th>prev</th><th>${s.thStatus}</th></tr>`;
  nodes.forEach(n => {
    const isU = step.currentU === n.id;
    const inQ = step.Q.includes(n.id);
    const isFinalized = step.finalized.includes(n.id);
    let status = inQ ? s.inQ : (isFinalized ? s.finalized : '');
    if (isU) status = s.currentU;
    const rowStyle = isU ? 'background:rgba(167,139,250,0.18);' :
      isFinalized ? 'background:rgba(107,203,119,0.10);' : '';
    html += `<tr style="${rowStyle}">
      <td>${n.name}</td>
      <td>${fmtNum(step.dist[n.id])}</td>
      <td>${step.prev[n.id] ? nameOf(step.prev[n.id]) : '—'}</td>
      <td>${status}</td>
    </tr>`;
  });
  table.innerHTML = html;
}

// ─────────────────────────────────────────────
//  Step controls
// ─────────────────────────────────────────────
function renderRunStep() {
  const step = steps[stepIndex];
  if (!step) return;

  document.getElementById('progressBar').style.width = `${Math.round((stepIndex / (steps.length - 1)) * 100)}%`;
  document.getElementById('explanation').textContent = step.message;
  document.getElementById('stepInfo').textContent = S().stepOf(stepIndex + 1, steps.length);
  renderPseudocode(step.codeLine);
  renderStateTable(step);
  renderGraph();

  document.getElementById('btnBack').disabled = stepIndex === 0;
  document.getElementById('btnNext').disabled = stepIndex === steps.length - 1;
  document.getElementById('btnPlay').disabled = stepIndex === steps.length - 1;
}

function stepForward() {
  if (stepIndex < steps.length - 1) {
    stepIndex++;
    renderRunStep();
  }
  if (stepIndex === steps.length - 1) stopPlay();
}

function stepBack() {
  stopPlay();
  if (stepIndex > 0) {
    stepIndex--;
    renderRunStep();
  }
}

function togglePlay() {
  if (playTimer) {
    stopPlay();
  } else {
    document.getElementById('btnPlay').textContent = S().pause;
    scheduleNext();
  }
}

function scheduleNext() {
  const speed = parseInt(document.getElementById('speedSlider').value, 10);
  const delay = 1400 - speed * 220;
  playTimer = setTimeout(() => {
    if (stepIndex < steps.length - 1) {
      stepIndex++;
      renderRunStep();
      if (stepIndex < steps.length - 1) {
        scheduleNext();
      } else {
        stopPlay();
      }
    } else {
      stopPlay();
    }
  }, delay);
}

function stopPlay() {
  if (playTimer) {
    clearTimeout(playTimer);
    playTimer = null;
  }
  document.getElementById('btnPlay').textContent = S().autoPlay;
}

function startRun() {
  if (nodes.length === 0) {
    alert(S().noNodes);
    return;
  }
  stopPlay();
  const sourceId = document.getElementById('sourceSelect').value;
  steps = buildDijkstraSteps(sourceId);
  stepIndex = 0;
  document.getElementById('runInfo').style.display = 'block';
  renderRunStep();
}

// ─────────────────────────────────────────────

function renderRunLegend() {
  const lg = S().legend;
  const legend = document.getElementById('runLegend');
  legend.innerHTML = `
    <div class="legend-item"><span class="legend-dot" style="border-color:#a78bfa"></span> ${lg.currentU}</div>
    <div class="legend-item"><span class="legend-dot" style="border-color:#f0c040"></span> ${lg.scanning}</div>
    <div class="legend-item"><span class="legend-dot" style="border-color:#4ecdc4;border-style:dashed;border-width:2px"></span> ${lg.scanBest}</div>
    <div class="legend-item"><span class="legend-dot" style="border-color:#6bcb77;background:#2f6b3a"></span> ${lg.finalized}</div>
    <div class="legend-item"><span class="legend-line" style="border-color:#f0a030"></span> ${lg.relaxing}</div>
    <div class="legend-item"><span class="legend-line" style="border-color:#6bcb77"></span> ${lg.tree}</div>
  `;
}

  document.getElementById('speedLabel').textContent = `${ev.target.value}×`;
});

const _storedLang = localStorage.getItem('lang');
if (_storedLang === 'de') { lang = 'de'; document.getElementById('langSelect').value = 'de'; applyStaticLang(); }
loadExample();
switchMode('build');
</script>
