<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logic Circuit Simulator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e22;
    color: #cccccc;
    min-height: 100vh;
    padding: 16px;
  }

  .app-wordmark {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666670;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #38383e;
  }

  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .panel {
    background: #252528;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  .panel-title {
    font-size: 0.72rem;
    color: #888888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 14px 0 8px;
  }
  .panel-title:first-child { margin-top: 0; }

  .palette-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .palette-item {
    background: #2a2a32;
    border: 2px solid #404048;
    border-radius: 8px;
    padding: 10px 6px 8px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .palette-item:hover { border-color: #22c55e; }
  .palette-item.active { border-color: #22c55e; background: rgba(34,197,94,0.1); }

  .palette-item svg { width: 48px; height: 32px; display: block; margin: 0 auto 4px; }
  .palette-item .lbl { font-size: 0.68rem; color: #aaaaaa; }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .toolbar-sep {
    width: 1px;
    height: 24px;
    background: #505055;
    margin: 0 4px;
  }

  .tool-btn {
    padding: 10px 14px;
    border: 2px solid #505055;
    border-radius: 8px;
    background: #383840;
    color: #aaaaaa;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }

  .tool-btn:hover { border-color: #22c55e; }
  .tool-btn.active { border-color: #22c55e; background: rgba(34,197,94,0.1); color: #22c55e; }

  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary   { background: #22c55e; color: #0a1a10; }
  .btn-secondary { background: #383840; color: #cccccc; }
  .btn-danger    { background: #b83030; color: #ffffff; }
  .btn-play      { background: #226633; color: #88eea8; }
  .btn-primary:hover:not(:disabled)   { background: #1ea84f; }
  .btn-secondary:hover:not(:disabled) { background: #48484f; }
  .btn-danger:hover:not(:disabled)    { background: #a02020; }
  .btn-play:hover:not(:disabled)      { background: #1a5028; }

  select {
    background: #383840;
    color: #cccccc;
    border: 2px solid #505055;
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 0.85rem;
  }

  .hint {
    color: #666668;
    font-size: 0.85rem;
    margin-bottom: 12px;
    min-height: 1.2em;
  }

  #circuitSvg {
    width: 100%;
    height: 600px;
    background: #13131a;
    border-radius: 8px;
    border: 1px solid #2a2a38;
    touch-action: none;
    display: block;
  }

  .clock-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 0.85rem;
    color: #888888;
  }

  @media (max-width: 700px) {
    body { padding: 8px; }
    .app { grid-template-columns: 1fr; }
    .palette-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .palette-item { padding: 8px 4px 6px; }
    #circuitSvg { height: 55vh; min-height: 260px; }
    .toolbar { gap: 6px; }
    .hint { font-size: 0.78rem; }
  }

  .toolbar-label { font-size: 0.82rem; color: #888888; }

  /* ── Light theme canvas + palette overrides ── */
  body.theme-light #circuitSvg { background: #f6f6f4; border-color: #cccccc; }
  body.theme-light .palette-item { background: #f0f0ee; border-color: #cccccc; }
  body.theme-light .palette-item:hover { border-color: #22c55e; }
  body.theme-light .palette-item.active { background: #edfff3; border-color: #22c55e; }
  body.theme-light .palette-item .lbl { color: #333333; }
</style>
</head>
<body>

<div class="app">

  <div class="panel">
    <div class="app-wordmark">Logic Circuit Simulator</div>
    <div class="panel-title">Inputs</div>
    <div class="palette-grid" id="paletteInputs"></div>

    <div class="panel-title">Outputs</div>
    <div class="palette-grid" id="paletteOutputs"></div>

    <div class="panel-title">Gates</div>
    <div class="palette-grid" id="paletteGates"></div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <button class="btn btn-secondary" id="btnSave">💾 Save</button>
      <button class="btn btn-secondary" id="btnLoad">📂 Load</button>
      <select id="samplesSelect" title="Load a sample circuit">
        <option value="">Samples…</option>
        <option value="half-adder">Half Adder</option>
        <option value="full-adder">Full Adder</option>
        <option value="sr-latch">SR Latch (NOR)</option>
        <option value="sr-latch-nand">SR Latch (NAND)</option>
        <option value="majority-voter">Majority Voter</option>
        <option value="gated-clock">Gated Clock</option>
      </select>
      <button class="btn btn-danger" id="btnClear">Clear</button>
      <input type="file" id="fileInput" accept=".json" style="display:none">
      <span class="toolbar-sep"></span>
      <button class="btn btn-secondary" id="btnUndo" title="Undo (Cmd+Z)">↩</button>
      <button class="btn btn-secondary" id="btnRedo" title="Redo (Cmd+Shift+Z)">↪</button>
      <span class="toolbar-sep"></span>
      <button class="btn btn-secondary" id="btnZoomOut" title="Zoom Out">−</button>
      <button class="btn btn-secondary" id="btnZoomIn" title="Zoom In">+</button>
      <button class="btn btn-secondary" id="btnZoomReset" title="Reset View">⊙</button>
      <span class="toolbar-sep"></span>
      <button class="tool-btn" id="btnLabelTool" title="Place text label (L)">Aa</button>
      <span class="toolbar-sep"></span>
      <label class="toolbar-label">Style:</label>
      <select id="vizStyle">
        <option value="label">Label</option>
        <option value="ansi" selected>ANSI</option>
      </select>
      <label class="toolbar-label">Theme:</label>
      <select id="pageThemeSelect">
        <option value="light" selected>Light</option>
        <option value="dark">Dark</option>
      </select>

      <div class="clock-control">
        Clock:
        <button class="btn btn-play" id="btnClockPlay">▶ Run</button>
        <select id="clockSpeed">
          <option value="2000">0.5 Hz</option>
          <option value="1000" selected>1 Hz</option>
          <option value="500">2 Hz</option>
          <option value="250">4 Hz</option>
        </select>
      </div>
    </div>
    <div class="hint" id="hint">Click a palette item, then click the canvas to place it.</div>

    <svg id="circuitSvg" viewBox="0 0 1040 600" preserveAspectRatio="none">
      <g id="wiresLayer"></g>
      <g id="labelsLayer"></g>
      <g id="previewLayer"></g>
      <g id="componentsLayer"></g>
    </svg>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  Component definitions
// ─────────────────────────────────────────────
const COMPONENT_DEFS = {
  switch: { category: 'input',  label: 'Switch',   w: 72, h: 50, inputs: 0, outputs: 1 },
  clock:  { category: 'input',  label: 'Clock',    w: 56, h: 44, inputs: 0, outputs: 1 },
  high:   { category: 'input',  label: 'High (1)', w: 48, h: 44, inputs: 0, outputs: 1 },
  low:    { category: 'input',  label: 'Low (0)',  w: 48, h: 44, inputs: 0, outputs: 1 },
  bulb:   { category: 'output', label: 'Bulb',     w: 52, h: 70, inputs: 1, outputs: 0, pinBottom: true },
  and:    { category: 'gate', label: 'AND',  w: 60, h: 44, inputs: 2, outputs: 1, negated: false },
  nand:   { category: 'gate', label: 'NAND', w: 60, h: 44, inputs: 2, outputs: 1, negated: true  },
  or:     { category: 'gate', label: 'OR',   w: 60, h: 44, inputs: 2, outputs: 1, negated: false },
  nor:    { category: 'gate', label: 'NOR',  w: 60, h: 44, inputs: 2, outputs: 1, negated: true  },
  xor:    { category: 'gate', label: 'XOR',  w: 60, h: 44, inputs: 2, outputs: 1, negated: false },
  xnor:   { category: 'gate', label: 'XNOR', w: 60, h: 44, inputs: 2, outputs: 1, negated: true  },
  not:    { category: 'gate', label: 'NOT',  w: 50, h: 44, inputs: 1, outputs: 1, negated: true  },
  buffer: { category: 'gate', label: 'BUF',  w: 50, h: 44, inputs: 1, outputs: 1, negated: false }
};

const PALETTE_LAYOUT = {
  paletteInputs:  ['switch', 'clock', 'high', 'low'],
  paletteOutputs: ['bulb'],
  paletteGates:   ['and', 'nand', 'or', 'nor', 'xor', 'xnor', 'not', 'buffer']
};

const ANSI_GATE_PATHS = {
  and:    'M 6 4 L 22 4 Q 96 22 22 40 L 6 40 Z',
  nand:   'M 6 4 L 22 4 Q 96 22 22 40 L 6 40 Z',
  or:     'M 6 4 Q 26 4 60 22 Q 26 40 6 40 Q 18 22 6 4 Z',
  nor:    'M 6 4 Q 26 4 60 22 Q 26 40 6 40 Q 18 22 6 4 Z',
  xor:    'M 10 4 Q 30 4 60 22 Q 30 40 10 40 Q 22 22 10 4 Z',
  xnor:   'M 10 4 Q 30 4 60 22 Q 30 40 10 40 Q 22 22 10 4 Z',
  not:    'M 6 6 L 50 22 L 6 38 Z',
  buffer: 'M 6 6 L 50 22 L 6 38 Z',
};

function inputPinPos(def, idx) {
  if (def.pinBottom) return { x: def.w / 2, y: def.h };
  if (def.inputs <= 1) return { x: 0, y: def.h / 2 };
  const step = def.h / (def.inputs + 1);
  return { x: 0, y: step * (idx + 1) };
}

function outputPinPos(def) {
  const bubbleGap = def.negated ? 8 : 0;
  return { x: def.w + bubbleGap, y: def.h / 2 };
}

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let components = [];  // {id, type, x, y, state}
let wires = [];        // {id, fromId, toId, toPin}
let labels = [];       // {id, x, y, text}
let nextId = 0;

let tool = 'select';   // 'select' | 'place' | 'label'
let visualTheme = 'ansi'; // 'label' | 'ansi'
let selectedIds = new Set();
let selectedWireIds = new Set();
let clipboard = null;
let selectionDrag = null;
let dragState = null;
let wireDraft = null;
let placingType = null;
let history = [];
let historyIndex = -1;
let clockTimer = null;
let clockRunning = false;
let vbX = 0, vbY = 0, vbW = 1040, vbH = 600;
const svgPtrs = new Map();
let prevPinch = null;
let pageTheme = 'light';

const values = {};     // componentId -> 0|1, recomputed by simulate()

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function svgPoint(evt) {
  const svg = document.getElementById('circuitSvg');
  const rect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  const scaleX = vb.width / rect.width;
  const scaleY = vb.height / rect.height;
  return {
    x: (evt.clientX - rect.left) * scaleX + vb.x,
    y: (evt.clientY - rect.top) * scaleY + vb.y
  };
}

function updateViewBox() {
  vbW = Math.max(200, Math.min(5000, vbW));
  vbH = vbW * (600 / 1040);
  document.getElementById('circuitSvg').setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
}

function zoomBy(factor, cx, cy) {
  if (cx === undefined) { cx = vbX + vbW / 2; cy = vbY + vbH / 2; }
  vbX = cx + (vbX - cx) * factor;
  vbY = cy + (vbY - cy) * factor;
  vbW *= factor;
  updateViewBox();
}

function componentById(id) { return components.find(c => c.id === id); }

function tc(dark, light) { return pageTheme === 'light' ? light : dark; }

function setHint(text) { document.getElementById('hint').textContent = text; }

// ─────────────────────────────────────────────
//  Component body rendering (shared by palette icons + canvas)
// ─────────────────────────────────────────────
function buildComponentBody(type, state, canvas) {
  const def = COMPONENT_DEFS[type];
  const g = svgEl('g', {});

  if (def.category === 'gate') {
    if (visualTheme === 'ansi' && ANSI_GATE_PATHS[type]) {
      g.appendChild(svgEl('path', { d: ANSI_GATE_PATHS[type], fill: tc('#252535','#ffffff'), stroke: tc('#7a8898','#333333'), 'stroke-width': 2 }));
      if (type === 'xor' || type === 'xnor') {
        g.appendChild(svgEl('path', { d: 'M 2 4 Q 14 22 2 40', fill: 'none', stroke: tc('#7a8898','#333333'), 'stroke-width': 2 }));
      }
    } else {
      g.appendChild(svgEl('rect', { x: 0, y: 0, width: def.w, height: def.h, rx: 8, ry: 8, fill: tc('#252535','#ffffff'), stroke: tc('#5a6a8a','#333333'), 'stroke-width': 2 }));
      const text = svgEl('text', { x: def.w / 2, y: def.h / 2 + 4, 'text-anchor': 'middle', 'font-size': 12, 'font-weight': 700, fill: tc('#dde8f0','#111111') });
      text.textContent = def.label;
      g.appendChild(text);
    }
    if (def.negated) {
      g.appendChild(svgEl('circle', { cx: def.w + 4, cy: def.h / 2, r: 4, fill: tc('#13131a','#f6f6f4'), stroke: tc('#aab8c8','#333333'), 'stroke-width': 1.5 }));
    }
  } else if (type === 'bulb') {
    const on = state === 1;
    const cx = def.w / 2, cr = cx - 4, cy = cr + 4;
    if (on) g.appendChild(svgEl('circle', { cx, cy, r: cr + 8, fill: '#f0c040', opacity: '0.22' }));
    g.appendChild(svgEl('circle', { cx, cy, r: cr, fill: on ? tc('#f0c040','#fef9c3') : tc('#2a2a3a','#ffffff'), stroke: on ? '#f0c040' : tc('#5a6a8a','#aaaaaa'), 'stroke-width': 2 }));
    g.appendChild(svgEl('rect', { x: cx - 9, y: cy + cr - 2, width: 18, height: def.h - cy - cr + 2, rx: 4, fill: tc('#3a4a5a','#cccccc') }));
  } else if (type === 'switch' || type === 'clock') {
    const on = state === 1;
    if (visualTheme === 'ansi' && type === 'switch') {
      const trackCol = on ? tc('#1e4a2a','#1e8040') : tc('#252535','#dddddd');
      const knobCol = on ? tc('#4caf50','#22c55e') : tc('#6a7a8a','#888888');
      g.appendChild(svgEl('rect', { x: 6, y: 17, width: def.w - 12, height: 16, rx: 8, fill: trackCol, stroke: on ? tc('#4caf50','#22c55e') : tc('#4a5a7a','#aaaaaa'), 'stroke-width': 1.5 }));
      g.appendChild(svgEl('circle', { cx: on ? def.w - 14 : 14, cy: def.h / 2, r: 12, fill: knobCol, stroke: tc('#ccc','#fff'), 'stroke-width': 1.2 }));
      const knobLbl = svgEl('text', { x: on ? def.w - 14 : 14, y: def.h / 2 + 4, 'text-anchor': 'middle', 'font-size': 11, 'font-weight': 700, fill: tc('#fff','#fff') });
      knobLbl.textContent = on ? '1' : '0';
      g.appendChild(knobLbl);
    } else {
      g.appendChild(svgEl('rect', { x: 0, y: 0, width: def.w, height: def.h, rx: 10, ry: 10, fill: tc('#252535','#ffffff'), stroke: on ? tc('#f0c040','#22c55e') : tc('#5a6a8a','#333333'), 'stroke-width': 2 }));
      const text = svgEl('text', { x: def.w / 2, y: def.h / 2 + 5, 'text-anchor': 'middle', 'font-size': 16, 'font-weight': 700, fill: on ? tc('#f0c040','#226633') : tc('#8898aa','#444444') });
      text.textContent = String(state);
      g.appendChild(text);
      if (type === 'clock') {
        g.appendChild(svgEl('path', { d: `M5,${def.h - 8} l4,-10 l4,8 l4,-12 l4,10`, fill: 'none', stroke: on ? tc('#f0c040','#22c55e') : tc('#5a6a8a','#999999'), 'stroke-width': 1.5 }));
      }
    }
  } else if (type === 'high' || type === 'low') {
    const v = type === 'high' ? 1 : 0;
    g.appendChild(svgEl('rect', { x: 0, y: 0, width: def.w, height: def.h, rx: 10, ry: 10, fill: tc('#252535','#ffffff'), stroke: v ? tc('#f0c040','#dd8800') : tc('#5a6a8a','#333333'), 'stroke-width': 2 }));
    const text = svgEl('text', { x: def.w / 2, y: def.h / 2 + 5, 'text-anchor': 'middle', 'font-size': 16, 'font-weight': 700, fill: v ? tc('#f0c040','#dd8800') : tc('#8898aa','#444444') });
    text.textContent = String(v);
    g.appendChild(text);
  }

  return g;
}

function labelBelow(def, text) {
  const t = svgEl('text', { x: def.w / 2, y: def.h + 13, 'text-anchor': 'middle', 'font-size': 9, fill: '#888' });
  t.textContent = text;
  return t;
}

// ─────────────────────────────────────────────
//  Palette
// ─────────────────────────────────────────────
function buildPalette() {
  for (const containerId in PALETTE_LAYOUT) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    PALETTE_LAYOUT[containerId].forEach(type => {
      const def = COMPONENT_DEFS[type];
      const item = document.createElement('div');
      item.className = 'palette-item';
      item.dataset.type = type;

      const svg = svgEl('svg', { viewBox: `-6 -6 ${def.w + 16} ${def.h + 12}` });
      svg.appendChild(buildComponentBody(type, type === 'high' ? 1 : 0, false));
      item.appendChild(svg);

      const lbl = document.createElement('div');
      lbl.className = 'lbl';
      lbl.textContent = def.label;
      item.appendChild(lbl);

      item.addEventListener('click', () => selectPaletteItem(type));
      container.appendChild(item);
    });
  }
}

function selectPaletteItem(type) {
  placingType = type;
  setTool('place');
  document.querySelectorAll('.palette-item').forEach(el => el.classList.toggle('active', el.dataset.type === type));
  setHint(`Click the canvas to place a ${COMPONENT_DEFS[type].label}.`);
}

// ─────────────────────────────────────────────
//  Simulation
// ─────────────────────────────────────────────
function gateOutput(type, inputVals) {
  const a = inputVals[0] || 0, b = inputVals[1] || 0;
  switch (type) {
    case 'and':  return (a && b) ? 1 : 0;
    case 'nand': return (a && b) ? 0 : 1;
    case 'or':   return (a || b) ? 1 : 0;
    case 'nor':  return (a || b) ? 0 : 1;
    case 'xor':  return (a !== b) ? 1 : 0;
    case 'xnor': return (a !== b) ? 0 : 1;
    case 'not':  return a ? 0 : 1;
    case 'buffer': return a ? 1 : 0;
  }
  return 0;
}

function simulate() {
  for (const id in values) delete values[id];

  components.forEach(c => {
    if (c.type === 'switch' || c.type === 'clock') values[c.id] = c.state || 0;
    else if (c.type === 'high') values[c.id] = 1;
    else if (c.type === 'low') values[c.id] = 0;
  });

  const gatesAndBulbs = components.filter(c => COMPONENT_DEFS[c.type].category === 'gate' || c.type === 'bulb');
  gatesAndBulbs.forEach(c => { values[c.id] = 0; });

  for (let iter = 0; iter < 50; iter++) {
    let changed = false;
    gatesAndBulbs.forEach(c => {
      const def = COMPONENT_DEFS[c.type];
      const inputVals = [];
      for (let i = 0; i < def.inputs; i++) {
        const w = wires.find(w => w.toId === c.id && w.toPin === i);
        inputVals.push(w ? (values[w.fromId] || 0) : 0);
      }
      const newVal = (c.type === 'bulb') ? (inputVals[0] || 0) : gateOutput(c.type, inputVals);
      if (values[c.id] !== newVal) { values[c.id] = newVal; changed = true; }
    });
    if (!changed) break;
  }
}

// ─────────────────────────────────────────────
//  Wire geometry + rendering
// ─────────────────────────────────────────────
function bezierPath(x1, y1, x2, y2) {
  const dx = Math.max(Math.abs(x2 - x1) / 2, 40);
  return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
}

function wireBezier(x1, y1, x2, y2, pinBottom) {
  if (pinBottom) {
    // approach the bottom connector from below so the wire doesn't route through the component body
    const dy = Math.max(Math.abs(y2 - y1) * 0.4 + 50, 70);
    const dx = Math.max(Math.abs(x2 - x1) / 2, 50);
    return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2} ${y2 + dy}, ${x2} ${y2}`;
  }
  return bezierPath(x1, y1, x2, y2);
}

function renderWires() {
  const layer = document.getElementById('wiresLayer');
  layer.innerHTML = '';
  wires.forEach(w => {
    const from = componentById(w.fromId), to = componentById(w.toId);
    if (!from || !to) return;
    const fromDef = COMPONENT_DEFS[from.type], toDef = COMPONENT_DEFS[to.type];
    const op = outputPinPos(fromDef);
    const ip = inputPinPos(toDef, w.toPin);
    const x1 = from.x + op.x, y1 = from.y + op.y, x2 = to.x + ip.x, y2 = to.y + ip.y;
    const on = (values[w.fromId] || 0) === 1;
    const trueCol = tc(visualTheme === 'ansi' ? '#4caf50' : '#f0c040', '#22c55e');
    const sel = selectedWireIds.has(w.id);
    const stroke = sel ? tc('#4a9eff','#2563eb') : (on ? trueCol : tc('#4a5a7a','#999999'));
    const d = wireBezier(x1, y1, x2, y2, toDef.pinBottom);
    layer.appendChild(svgEl('path', { d, fill: 'none', stroke, 'stroke-width': (sel || on) ? 3 : 2 }));
    const hit = svgEl('path', { d, fill: 'none', stroke: 'transparent', 'stroke-width': 12 });
    hit.style.cursor = 'pointer';
    hit.addEventListener('pointerdown', (ev) => {
      ev.stopPropagation();
      if (ev.shiftKey) {
        if (selectedWireIds.has(w.id)) selectedWireIds.delete(w.id); else selectedWireIds.add(w.id);
      } else {
        selectedIds.clear(); selectedWireIds.clear(); selectedWireIds.add(w.id);
      }
      renderAll();
    });
    layer.appendChild(hit);
  });
}

function renderWirePreview(x1, y1, x2, y2) {
  const layer = document.getElementById('previewLayer');
  layer.innerHTML = '';
  layer.appendChild(svgEl('path', { d: bezierPath(x1, y1, x2, y2), fill: 'none', stroke: tc('#f0c040','#2563eb'), 'stroke-width': 2, 'stroke-dasharray': '4 3' }));
}

function clearWirePreview() {
  document.getElementById('previewLayer').innerHTML = '';
}

// ─────────────────────────────────────────────
//  Component rendering
// ─────────────────────────────────────────────
function renderComponent(comp) {
  const def = COMPONENT_DEFS[comp.type];
  const g = svgEl('g', { transform: `translate(${comp.x},${comp.y})` });
  g.dataset.compId = comp.id;
  g.style.cursor = wireDraft ? 'default' : 'grab';

  if (selectedIds.has(comp.id)) {
    g.appendChild(svgEl('rect', { x: -5, y: -5, width: def.w + 10, height: def.h + 10, rx: 12,
      fill: 'none', stroke: tc('#4a9eff','#2563eb'), 'stroke-width': 2, 'stroke-dasharray': '5 3' }));
  }

  const bodyState = comp.type === 'bulb' ? (values[comp.id] || 0) : comp.state;
  g.appendChild(buildComponentBody(comp.type, bodyState, true));

  for (let i = 0; i < def.inputs; i++) {
    const p = inputPinPos(def, i);
    const pin = svgEl('circle', { cx: p.x, cy: p.y, r: 6, fill: tc('#13131a','#f6f6f4'), stroke: tc('#7a8898','#555555'), 'stroke-width': 1.5 });
    pin.style.cursor = 'crosshair';
    pin.addEventListener('pointerdown', (ev) => ev.stopPropagation());
    pin.addEventListener('click', (ev) => { ev.stopPropagation(); if (wireDraft) completeWire(ev, comp.id, i); });
    g.appendChild(pin);
  }
  if (def.outputs > 0) {
    const p = outputPinPos(def);
    const pin = svgEl('circle', { cx: p.x, cy: p.y, r: 6, fill: tc('#13131a','#eef2f9'), stroke: tc('#f0c040','#f59e0b'), 'stroke-width': 1.5 });
    pin.style.cursor = 'crosshair';
    pin.addEventListener('pointerdown', (ev) => ev.stopPropagation());
    pin.addEventListener('click', (ev) => { ev.stopPropagation(); startWire(ev, comp.id); });
    g.appendChild(pin);
  }

  g.addEventListener('pointerdown', (ev) => onComponentPointerDown(ev, comp.id));
  document.getElementById('componentsLayer').appendChild(g);
}

function renderAll() {
  simulate();
  renderWires();
  renderLabels();
  const layer = document.getElementById('componentsLayer');
  layer.innerHTML = '';
  components.forEach(renderComponent);
}

function renderLabels() {
  const layer = document.getElementById('labelsLayer');
  layer.innerHTML = '';
  const fontSize = 13;
  const charW = 7.5;
  labels.forEach(lbl => {
    const g = svgEl('g', { transform: `translate(${lbl.x},${lbl.y})`, 'data-label-id': lbl.id, style: 'cursor:move' });
    if (selectedIds.has(lbl.id)) {
      const tw = Math.max(lbl.text.length * charW, 20);
      g.appendChild(svgEl('rect', { x: -4, y: -(fontSize + 4), width: tw + 8, height: fontSize + 8, rx: 3,
        fill: 'none', stroke: tc('#4a9eff', '#2563eb'), 'stroke-width': 1.5, 'stroke-dasharray': '4 3' }));
    }
    const txt = svgEl('text', {
      x: 0, y: 0, 'font-size': fontSize, 'font-family': 'sans-serif',
      fill: tc('#e8e8e8', '#222222'), 'dominant-baseline': 'auto'
    });
    txt.textContent = lbl.text;
    g.appendChild(txt);
    g.addEventListener('pointerdown', ev => onLabelPointerDown(ev, lbl.id));
    g.addEventListener('dblclick', ev => { ev.stopPropagation(); editLabel(lbl.id); });
    layer.appendChild(g);
  });
}

function editLabel(id) {
  const lbl = labels.find(l => l.id === id);
  if (!lbl) return;
  const svg = document.getElementById('circuitSvg');
  const rect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  const scX = rect.width / vb.width, scY = rect.height / vb.height;
  const sx = (lbl.x - vb.x) * scX + rect.left;
  const sy = (lbl.y - vb.y) * scY + rect.top;

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = lbl.text;
  const fs = Math.round(13 * scY);
  inp.style.cssText = [
    `position:fixed`, `left:${Math.round(sx)}px`, `top:${Math.round(sy - fs - 2)}px`,
    `font-size:${fs}px`, `font-family:sans-serif`, `padding:2px 5px`,
    `border:1.5px solid ${pageTheme === 'light' ? '#22c55e' : '#f0c040'}`,
    `border-radius:3px`, `background:${pageTheme === 'light' ? '#ffffff' : '#1e2535'}`,
    `color:${pageTheme === 'light' ? '#111111' : '#eee'}`, `min-width:60px`,
    `z-index:200`, `outline:none`
  ].join(';');
  document.body.appendChild(inp);
  inp.focus(); inp.select();

  let done = false;
  const finish = () => {
    if (done) return; done = true;
    lbl.text = inp.value.trim();
    if (!lbl.text) labels = labels.filter(l => l.id !== id);
    inp.remove();
    pushHistory();
    renderAll();
  };
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === 'Escape') { e.preventDefault(); finish(); }
  });
  inp.addEventListener('blur', finish);
}

function onLabelPointerDown(ev, id) {
  if (wireDraft || tool === 'place') return;
  if (svgPtrs.size >= 2) return;
  ev.stopPropagation();
  const p = svgPoint(ev);
  if (ev.shiftKey) {
    if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    renderAll(); return;
  }
  if (!selectedIds.has(id)) {
    selectedIds.clear(); selectedWireIds.clear();
    selectedIds.add(id); renderAll();
  }
  const snapshot = [...selectedIds].map(sid => {
    const c = componentById(sid) || labels.find(l => l.id === sid);
    return c ? { id: sid, origX: c.x, origY: c.y } : null;
  }).filter(Boolean);
  dragState = { startX: p.x, startY: p.y, snapshot, moved: false };
  window.addEventListener('pointermove', onComponentDragMove);
  window.addEventListener('pointerup', onComponentDragUp);
}

// ─────────────────────────────────────────────
//  Component interaction: select/move/toggle, delete
// ─────────────────────────────────────────────
function onComponentPointerDown(ev, id) {
  if (wireDraft || tool === 'place') return;
  if (svgPtrs.size >= 2) return;
  ev.stopPropagation();
  const p = svgPoint(ev);
  if (ev.shiftKey) {
    if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    renderAll(); return;
  }
  if (!selectedIds.has(id)) {
    selectedIds.clear(); selectedWireIds.clear();
    selectedIds.add(id); renderAll();
  }
  const snapshot = [...selectedIds].map(sid => {
    const c = componentById(sid) || labels.find(l => l.id === sid);
    return c ? { id: sid, origX: c.x, origY: c.y } : null;
  }).filter(Boolean);
  dragState = { startX: p.x, startY: p.y, snapshot, moved: false };
  window.addEventListener('pointermove', onComponentDragMove);
  window.addEventListener('pointerup', onComponentDragUp);
}

function onComponentDragMove(ev) {
  if (!dragState) return;
  const p = svgPoint(ev);
  const dx = p.x - dragState.startX, dy = p.y - dragState.startY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragState.moved = true;
  if (dragState.moved) {
    dragState.snapshot.forEach(m => {
      const c = componentById(m.id);
      if (c) { c.x = m.origX + dx; c.y = m.origY + dy; return; }
      const l = labels.find(lb => lb.id === m.id);
      if (l) { l.x = m.origX + dx; l.y = m.origY + dy; }
    });
    renderAll();
  }
}

function onComponentDragUp() {
  window.removeEventListener('pointermove', onComponentDragMove);
  window.removeEventListener('pointerup', onComponentDragUp);
  if (dragState) {
    if (dragState.moved) {
      pushHistory();
    } else if (dragState.snapshot.length === 1) {
      const comp = componentById(dragState.snapshot[0].id);
      if (comp && (comp.type === 'switch' || comp.type === 'clock')) {
        comp.state = comp.state ? 0 : 1;
        pushHistory();
        renderAll();
      }
    }
  }
  dragState = null;
}

function deleteSelected() {
  if (selectedIds.size === 0 && selectedWireIds.size === 0) return;
  const delIds = new Set(selectedIds);
  components = components.filter(c => !delIds.has(c.id));
  labels = labels.filter(l => !delIds.has(l.id));
  wires = wires.filter(w => !selectedWireIds.has(w.id) && !delIds.has(w.fromId) && !delIds.has(w.toId));
  selectedIds.clear(); selectedWireIds.clear();
  pushHistory();
  renderAll();
}

function onSvgPointerDown(ev) {
  if (wireDraft) return;
  if (svgPtrs.size >= 2) return;
  if (ev.target.closest('g[data-comp-id]')) return;
  if (ev.target.closest('g[data-label-id]')) return;
  if (tool === 'place') return;
  const p = svgPoint(ev);
  selectionDrag = { x0: p.x, y0: p.y, x: p.x, y: p.y, w: 0, h: 0 };
  window.addEventListener('pointermove', onSelectionDragMove);
  window.addEventListener('pointerup', onSelectionDragUp);
}

function onSelectionDragMove(ev) {
  if (!selectionDrag) return;
  const p = svgPoint(ev);
  selectionDrag.x = Math.min(p.x, selectionDrag.x0); selectionDrag.y = Math.min(p.y, selectionDrag.y0);
  selectionDrag.w = Math.abs(p.x - selectionDrag.x0); selectionDrag.h = Math.abs(p.y - selectionDrag.y0);
  const layer = document.getElementById('previewLayer');
  layer.innerHTML = '';
  if (selectionDrag.w > 4 || selectionDrag.h > 4) {
    layer.appendChild(svgEl('rect', { x: selectionDrag.x, y: selectionDrag.y, width: selectionDrag.w, height: selectionDrag.h,
      fill: 'rgba(74,158,255,0.08)', stroke: '#4a9eff', 'stroke-width': 1, 'stroke-dasharray': '4 2' }));
  }
}

function onSelectionDragUp(ev) {
  window.removeEventListener('pointermove', onSelectionDragMove);
  window.removeEventListener('pointerup', onSelectionDragUp);
  if (!selectionDrag) return;
  const r = selectionDrag; selectionDrag = null;
  document.getElementById('previewLayer').innerHTML = '';
  if (r.w > 6 || r.h > 6) {
    if (!ev.shiftKey) { selectedIds.clear(); selectedWireIds.clear(); }
    components.forEach(c => {
      const def = COMPONENT_DEFS[c.type];
      if (c.x >= r.x && c.x + def.w <= r.x + r.w && c.y >= r.y && c.y + def.h <= r.y + r.h) selectedIds.add(c.id);
    });
  } else if (!ev.shiftKey) { selectedIds.clear(); selectedWireIds.clear(); }
  renderAll();
}

function copySelected() {
  const selComps = components.filter(c => selectedIds.has(c.id));
  const selLabels = labels.filter(l => selectedIds.has(l.id));
  if (!selComps.length && !selLabels.length) return;
  const selIdSet = new Set(selComps.map(c => c.id));
  const allX = [...selComps.map(c => c.x), ...selLabels.map(l => l.x)];
  const allY = [...selComps.map(c => c.y), ...selLabels.map(l => l.y)];
  const minX = Math.min(...allX), minY = Math.min(...allY);
  clipboard = {
    components: selComps.map(c => ({ ...c, x: c.x - minX, y: c.y - minY })),
    wires: wires.filter(w => selIdSet.has(w.fromId) && selIdSet.has(w.toId)).map(w => ({ ...w })),
    labels: selLabels.map(l => ({ ...l, x: l.x - minX, y: l.y - minY }))
  };
}

function paste() {
  if (!clipboard) return;
  const idMap = {};
  const newComps = clipboard.components.map(c => {
    const newId = 'c' + (nextId++); idMap[c.id] = newId;
    return { ...c, id: newId, x: c.x + 40, y: c.y + 40 };
  });
  const newWires = clipboard.wires.filter(w => idMap[w.fromId] && idMap[w.toId])
    .map(w => ({ id: 'w' + (nextId++), fromId: idMap[w.fromId], toId: idMap[w.toId], toPin: w.toPin }));
  const newLabels = (clipboard.labels || []).map(l => ({ ...l, id: 'l' + (nextId++), x: l.x + 40, y: l.y + 40 }));
  components.push(...newComps); wires.push(...newWires); labels.push(...newLabels);
  selectedIds = new Set([...newComps.map(c => c.id), ...newLabels.map(l => l.id)]);
  selectedWireIds.clear();
  pushHistory();
  renderAll();
}

// ─────────────────────────────────────────────
//  Undo / Redo
// ─────────────────────────────────────────────
function pushHistory() {
  history = history.slice(0, historyIndex + 1);
  history.push({
    components: JSON.parse(JSON.stringify(components)),
    wires: JSON.parse(JSON.stringify(wires)),
    labels: JSON.parse(JSON.stringify(labels))
  });
  historyIndex++;
  if (history.length > 100) { history.shift(); historyIndex--; }
}

function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  const s = history[historyIndex];
  components = JSON.parse(JSON.stringify(s.components));
  wires = JSON.parse(JSON.stringify(s.wires));
  labels = JSON.parse(JSON.stringify(s.labels || []));
  selectedIds.clear(); selectedWireIds.clear();
  if (wireDraft) cancelWireDraft();
  renderAll();
}

function redo() {
  if (historyIndex >= history.length - 1) return;
  historyIndex++;
  const s = history[historyIndex];
  components = JSON.parse(JSON.stringify(s.components));
  wires = JSON.parse(JSON.stringify(s.wires));
  labels = JSON.parse(JSON.stringify(s.labels || []));
  selectedIds.clear(); selectedWireIds.clear();
  renderAll();
}

// ─────────────────────────────────────────────
//  Placement preview
// ─────────────────────────────────────────────
function renderPlacePreview(ev) {
  const layer = document.getElementById('previewLayer');
  layer.innerHTML = '';
  if (!placingType) return;
  const def = COMPONENT_DEFS[placingType];
  const p = svgPoint(ev);
  const g = svgEl('g', { transform: `translate(${p.x - def.w / 2},${p.y - def.h / 2})`, opacity: '0.45', 'pointer-events': 'none' });
  g.appendChild(buildComponentBody(placingType, 0, true));
  layer.appendChild(g);
}

// ─────────────────────────────────────────────
//  Wire drawing
// ─────────────────────────────────────────────
function startWire(ev, fromCompId) {
  ev.stopPropagation();
  document.getElementById('circuitSvg').removeEventListener('pointermove', onWireDraftMove);
  clearWirePreview();
  const comp = componentById(fromCompId);
  const p = outputPinPos(COMPONENT_DEFS[comp.type]);
  wireDraft = { fromId: fromCompId, x1: comp.x + p.x, y1: comp.y + p.y };
  document.getElementById('circuitSvg').addEventListener('pointermove', onWireDraftMove);
  setHint('Click an input pin to connect · click elsewhere to cancel');
}

function onWireDraftMove(ev) {
  if (!wireDraft) return;
  const p = svgPoint(ev);
  renderWirePreview(wireDraft.x1, wireDraft.y1, p.x, p.y);
}

function cancelWireDraft() {
  document.getElementById('circuitSvg').removeEventListener('pointermove', onWireDraftMove);
  wireDraft = null;
  clearWirePreview();
  setHint(TOOL_HINTS.select);
}

function completeWire(ev, toCompId, toPin) {
  if (!wireDraft) return;
  ev.stopPropagation();
  const fromId = wireDraft.fromId;
  cancelWireDraft();
  if (fromId === toCompId) return;
  wires = wires.filter(w => !(w.toId === toCompId && w.toPin === toPin));
  wires.push({ id: 'w' + (nextId++), fromId, toId: toCompId, toPin });
  pushHistory();
  renderAll();
}

// ─────────────────────────────────────────────
//  Placement
// ─────────────────────────────────────────────
function placeComponent(type, x, y) {
  const comp = { id: 'c' + (nextId++), type, x, y };
  if (type === 'switch' || type === 'clock') comp.state = 0;
  components.push(comp);
  pushHistory();
  renderAll();
}

function onSvgClick(ev) {
  if (wireDraft) { cancelWireDraft(); return; }
  if (tool === 'label') {
    if (ev.target.closest('g[data-comp-id]') || ev.target.closest('g[data-label-id]')) return;
    const p = svgPoint(ev);
    const id = 'l' + (nextId++);
    labels.push({ id, x: Math.round(p.x), y: Math.round(p.y), text: '' });
    renderAll();
    setTool('select');
    editLabel(id);
    return;
  }
  if (tool !== 'place' || !placingType) return;
  if (ev.target.closest('g[data-comp-id]')) return;
  const def = COMPONENT_DEFS[placingType];
  const p = svgPoint(ev);
  placeComponent(placingType, p.x - def.w / 2, p.y - def.h / 2);
  if (!ev.shiftKey) setTool('select');
}

// ─────────────────────────────────────────────
//  Tool switching
// ─────────────────────────────────────────────
const TOOL_HINTS = {
  select: 'Click to select · Shift+click multi-select · Drag to move · Click output pin (gold) to wire · Del to delete',
  label:  'Click on canvas to place a text label · type text · Enter to confirm'
};

function setTool(t) {
  if (wireDraft) cancelWireDraft();
  tool = t;
  if (t !== 'place') {
    placingType = null;
    document.querySelectorAll('.palette-item').forEach(el => el.classList.remove('active'));
    document.getElementById('previewLayer').innerHTML = '';
  }
  const lblBtn = document.getElementById('btnLabelTool');
  if (lblBtn) lblBtn.classList.toggle('active', t === 'label');
  if (TOOL_HINTS[t]) setHint(TOOL_HINTS[t]);
  renderAll();
}

// ─────────────────────────────────────────────
//  Clock auto-run
// ─────────────────────────────────────────────
function scheduleClockTick() {
  const period = parseInt(document.getElementById('clockSpeed').value, 10);
  clockTimer = setTimeout(() => {
    components.forEach(c => { if (c.type === 'clock') c.state = c.state ? 0 : 1; });
    renderAll();
    if (clockRunning) scheduleClockTick();
  }, period / 2);
}

function toggleClockRun() {
  clockRunning = !clockRunning;
  const btn = document.getElementById('btnClockPlay');
  if (clockRunning) {
    btn.textContent = '⏸ Pause';
    scheduleClockTick();
  } else {
    btn.textContent = '▶ Run';
    clearTimeout(clockTimer);
  }
}

// ─────────────────────────────────────────────
//  Save / Load / Clear
// ─────────────────────────────────────────────
function saveCircuit() {
  const data = JSON.stringify({ version: 1, components, wires, labels }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'circuit.json';
  a.click();
  URL.revokeObjectURL(url);
}

function applyCircuitData(data) {
  if (!Array.isArray(data.components) || !Array.isArray(data.wires)) throw new Error('bad format');
  components = JSON.parse(JSON.stringify(data.components));
  wires = JSON.parse(JSON.stringify(data.wires));
  labels = JSON.parse(JSON.stringify(data.labels || []));
  history = []; historyIndex = -1;
  pushHistory();
  selectedIds.clear(); selectedWireIds.clear();
  nextId = 0;
  [...components, ...wires, ...labels].forEach(o => {
    const n = parseInt(String(o.id).replace(/\D/g, ''), 10);
    if (!isNaN(n) && n >= nextId) nextId = n + 1;
  });
  setTool('select');
  renderAll();
}

function loadCircuitFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try { applyCircuitData(JSON.parse(reader.result)); }
    catch (e) { alert("Could not load this file — it doesn't look like a valid circuit."); }
  };
  reader.readAsText(file);
}

function clearCircuit() {
  if (components.length && !confirm('Clear the whole circuit?')) return;
  if (wireDraft) cancelWireDraft();
  components = []; wires = []; labels = [];
  selectedIds.clear(); selectedWireIds.clear();
  history = []; historyIndex = -1;
  pushHistory();
  renderAll();
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
document.getElementById('vizStyle').addEventListener('change', (ev) => { visualTheme = ev.target.value; buildPalette(); renderAll(); });
document.getElementById('pageThemeSelect').addEventListener('change', (ev) => { pageTheme = ev.target.value; document.body.classList.toggle('theme-light', pageTheme === 'light'); buildPalette(); renderAll(); });
document.getElementById('samplesSelect').addEventListener('change', (ev) => {
  const key = ev.target.value;
  ev.target.value = '';
  if (key && SAMPLE_CIRCUITS[key]) applyCircuitData(SAMPLE_CIRCUITS[key]);
});
document.getElementById('btnClockPlay').addEventListener('click', toggleClockRun);
document.getElementById('clockSpeed').addEventListener('change', () => { if (clockRunning) { clearTimeout(clockTimer); scheduleClockTick(); } });
document.getElementById('btnSave').addEventListener('click', saveCircuit);
document.getElementById('btnLoad').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (ev) => { const file = ev.target.files[0]; if (file) loadCircuitFile(file); ev.target.value = ''; });
document.getElementById('btnClear').addEventListener('click', clearCircuit);
document.getElementById('circuitSvg').addEventListener('click', onSvgClick);
document.getElementById('circuitSvg').addEventListener('pointerdown', onSvgPointerDown);

document.addEventListener('keydown', (ev) => {
  if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'SELECT' || ev.target.tagName === 'TEXTAREA') return;
  if (ev.key === 'Delete' || ev.key === 'Backspace') {
    if (wireDraft) cancelWireDraft(); else deleteSelected();
  } else if (ev.key === 'Escape') {
    if (wireDraft) cancelWireDraft();
    else { selectedIds.clear(); selectedWireIds.clear(); if (tool === 'place' || tool === 'label') setTool('select'); renderAll(); }
  } else if ((ev.ctrlKey || ev.metaKey) && ev.key === 'c') {
    copySelected();
  } else if ((ev.ctrlKey || ev.metaKey) && ev.key === 'v') {
    paste();
  } else if ((ev.ctrlKey || ev.metaKey) && ev.key === 'a') {
    ev.preventDefault();
    selectedIds = new Set([...components.map(c => c.id), ...labels.map(l => l.id)]);
    selectedWireIds = new Set(wires.map(w => w.id));
    renderAll();
  } else if (ev.key === 'l' || ev.key === 'L') {
    setTool(tool === 'label' ? 'select' : 'label');
  } else if ((ev.ctrlKey || ev.metaKey) && !ev.shiftKey && ev.key === 'z') {
    ev.preventDefault(); undo();
  } else if ((ev.ctrlKey || ev.metaKey) && (ev.key === 'y' || (ev.shiftKey && ev.key === 'z'))) {
    ev.preventDefault(); redo();
  }
});

document.getElementById('circuitSvg').addEventListener('pointermove', (ev) => {
  if (tool === 'place' && placingType && svgPtrs.size < 2) renderPlacePreview(ev);
});

document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);
document.getElementById('btnLabelTool').addEventListener('click', () => setTool(tool === 'label' ? 'select' : 'label'));
document.getElementById('btnZoomIn').addEventListener('click', () => zoomBy(0.7));
document.getElementById('btnZoomOut').addEventListener('click', () => zoomBy(1 / 0.7));
document.getElementById('btnZoomReset').addEventListener('click', () => { vbX = 0; vbY = 0; vbW = 1040; updateViewBox(); });

// Scroll to pan · Ctrl+scroll or trackpad pinch to zoom
document.getElementById('circuitSvg').addEventListener('wheel', (ev) => {
  ev.preventDefault();
  if (ev.ctrlKey) {
    const p = svgPoint(ev);
    zoomBy(Math.pow(1.002, ev.deltaY), p.x, p.y);
  } else {
    const r = document.getElementById('circuitSvg').getBoundingClientRect();
    const mult = ev.deltaMode === 1 ? 16 : ev.deltaMode === 2 ? 400 : 1;
    vbX += ev.deltaX * mult * (vbW / r.width);
    vbY += ev.deltaY * mult * (vbH / r.height);
    updateViewBox();
  }
}, { passive: false });

// Pinch zoom + 2-finger pan (touch)
const _cs = document.getElementById('circuitSvg');
_cs.addEventListener('pointerdown', ev => svgPtrs.set(ev.pointerId, { x: ev.clientX, y: ev.clientY }), { capture: true });
_cs.addEventListener('pointermove', ev => {
  if (!svgPtrs.has(ev.pointerId)) return;
  svgPtrs.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
  if (svgPtrs.size < 2) { prevPinch = null; return; }
  if (dragState) {
    window.removeEventListener('pointermove', onComponentDragMove);
    window.removeEventListener('pointerup', onComponentDragUp);
    dragState = null;
  }
  if (selectionDrag) {
    window.removeEventListener('pointermove', onSelectionDragMove);
    window.removeEventListener('pointerup', onSelectionDragUp);
    selectionDrag = null;
    document.getElementById('previewLayer').innerHTML = '';
  }
  const pts = [...svgPtrs.values()];
  const midX = (pts[0].x + pts[1].x) / 2, midY = (pts[0].y + pts[1].y) / 2;
  const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
  if (prevPinch && dist > 0) {
    const r = _cs.getBoundingClientRect();
    const scX = vbW / r.width, scY = vbH / r.height;
    vbX -= (midX - prevPinch.midX) * scX;
    vbY -= (midY - prevPinch.midY) * scY;
    const zf = prevPinch.dist / dist;
    const px = (midX - r.left) * scX + vbX;
    const py = (midY - r.top) * scY + vbY;
    vbX = px + (vbX - px) * zf;
    vbY = py + (vbY - py) * zf;
    vbW *= zf;
    updateViewBox();
  }
  prevPinch = { midX, midY, dist };
}, { capture: true });
const _pu = ev => { svgPtrs.delete(ev.pointerId); if (svgPtrs.size < 2) prevPinch = null; };
_cs.addEventListener('pointerup', _pu, { capture: true });
_cs.addEventListener('pointercancel', _pu, { capture: true });

document.body.classList.add('theme-light');
buildPalette();
pushHistory();
setTool('select');
</script>
